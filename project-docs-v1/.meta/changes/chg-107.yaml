base_content: "<!-- @id:impl-version-merge-engine -->\n## 版本合并引擎（两阶段 + 失败回退）\n\n实现 `version confirm`：守卫 → merge → git commit，保证原子性。\n\
  \n### 流程\n\n```python\ndef version_confirm(root: Path, version: str) -> dict:\n    # ── 阶段1：预检守卫 ──\n    state = load_version_state(root,\
  \ version)\n    tasks = load_tasks(root, version)\n    if any(t.status != \"done\" for t in tasks):\n        return fail(\"\
  存在未完成 task，无法 confirm\", code=\"TASK_NOT_DONE\")\n    if not git_clean(root):\n        return fail(\"git 工作区不干净\", code=\"\
  GIT_DIRTY\")\n\n    # ── 阶段2：merge（写 docs/，可回退）──\n    backup = snapshot_docs(root)            # 内存/临时备份 docs/\n    try:\n\
  \        merge_chunks_to_baseline(root, version)        # 同名 chunk 替换\n        extract_dynamic_global(root, version)   \
  \       # impl @extract → 动态 global\n        merge_specgraph_to_baseline(root, version)     # 版本图节点/边并入全局 specgraph.yaml\n\
  \        # ── 阶段3：git commit ──\n        git_add_commit(root, message=state.title)\n    except Exception as e:\n       \
  \ restore_docs(root, backup)          # 回退：恢复 docs/ 到 merge 前\n        return fail(f\"merge/commit 失败已回退: {e}\", code=\"\
  MERGE_ROLLBACK\")\n\n    state.phase = \"merged\"; save(state)\n    return {\"ok\": True, \"version\": version, \"commit_msg\"\
  : state.title}\n```\n\n### 合并规则（按 chunk 维度）\n- 同名 chunk：用本版本内容替换基线对应 chunk（不覆盖无关全局信息）\n- 新增 chunk：追加到基线\n- 其他 chunk：保持不动\n\
  \n### specgraph 合并（merge_specgraph_to_baseline）\n- 将 `specgraph-{version}.yaml` 的节点与边并入全局 `specgraph.yaml`（baseline）\n-\
  \ 节点 URI 的 version 段由 `{version}` 改写为 `baseline`\n- 同名 chunk 的节点/边按替换处理（与 chunk 合并一致）\n- 合并成功后，`specgraph-{version}.yaml`\
  \ 可随版本归档（merged 版本工作区保留供追溯）\n\n### 原子性\n- commit 失败 → 回退 docs/ 到 merge 前，要么全成要么全不动\n- 守卫不通过 → 不动任何文件\n- pre-merge 校验已在 impl\
  \ confirm 阶段完成（环/版本内重复），此处不再重复\n\n<!-- @ref:prd/ait-redesign#prd-version-merge rel:implements -->"
new_content: '<!-- @id:impl-version-merge-duplicate-add-guard -->

  ## version merge duplicate-add guard and inherited impl no-op semantics


  <!-- @ref:prd/merge-inherit-noop#prd-version-merge rel:implements -->


  ### Change points


  #### 1. Duplicate add guard


  Add a merge precheck in `VersionManager` that inspects effective committed records before any docs write.


  - Build the current baseline chunk id set from `IndexManager.load_baseline()`.

  - For every effective record with `action == "add"`, if `record.id` already exists in baseline, raise `ValidationError`
  with code `DUPLICATE_BASELINE_CHUNK`.

  - The error must include the duplicate chunk id and file where possible.

  - Run the same guard from `confirm()` before the rollback phase starts, so `version confirm` returns `DUPLICATE_BASELINE_CHUNK`
  instead of wrapping it as `MERGE_ROLLBACK`.


  #### 2. Inherited impl representation


  Change `ImplManager.inherit()` so inherited baseline impl chunks are not recorded as `action=add`.


  - Keep copying the baseline impl chunk into the version workspace so task/context assembly can read it.

  - Register inherited chunks as `action=modify`, `overrides=<same impl id>`, and `base_hash=<baseline chunk hash>`.

  - The chunk content is identical to baseline, so merge replaces the existing chunk with equivalent content instead of appending
  a duplicate.

  - This preserves the existing schema and does not add `action=inherit`.


  #### 3. Merge behavior


  `merge_engine.merge_file()` already replaces `overrides` for `modify`; keep that behavior unchanged.


  - `action=modify` plus `overrides` replaces the baseline chunk.

  - `action=add` appends only when the id is truly new.

  - `action=delete` removes `overrides`.


  #### 4. Tests


  Add focused regression tests in `tests/test_merge_workflow.py` and `tests/test_impl_inherit.py`.


  - `VersionManager.merge()` rejects an `action=add` record whose id already exists in baseline.

  - `VersionManager.confirm()` surfaces the same error code before docs mutation.

  - `ImplManager.inherit()` records inherited chunks as same-id modify records.

  - Inheriting baseline impl chunks and confirming the version leaves only one copy of each inherited chunk in baseline.


  ### Boundaries


  - Do not add `action=inherit` to schemas.

  - Do not change `merge_engine.merge_file()` replacement semantics.

  - Do not make merge perform semantic or partial-content patching.'
