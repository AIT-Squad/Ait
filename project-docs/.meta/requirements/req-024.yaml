prd_draft: '<!-- @id:prd-v21-new-model-init-baseline -->

  ## v2.1 new-model init baseline


  <!-- @summary: ait init should be able to bootstrap a PRD/FSD/TDD baseline that can be used for future dogfood development
  -->


  ### Overview


  AIT v2.0 introduced the parallel PRD/FSD/TDD model, but `ait init` still bootstraps the legacy baseline shape. A fresh or
  rebuilt project currently receives `docs/global/*` plus legacy `docs/prd` and `docs/impl` placeholders, with no PRD/FSD/TDD
  root documents and no new-model graph relations.


  This blocks the planned project-docs rebuild because the rebuilt global documentation should become the active v2.0-compatible
  baseline for future dogfood development.


  ### Business Rules


  - `ait init` must support bootstrapping a new-model baseline for PRD/FSD/TDD projects.

  - The new-model init path must create baseline PRD/FSD/TDD document containers under `docs/prd`, `docs/fsd`, and `docs/tdd`.

  - The new-model init path must create at least one PRD root document and one root FSD document.

  - The PRD root chunk must `decomposes` the root FSD root chunk through specgraph.

  - The initialized baseline must be reindexable by the existing chunks-index and specgraph pipeline.

  - The initialized baseline must pass PRD/FSD/TDD graph validation.

  - Legacy init behavior must remain available for existing old-model projects unless an explicit migration or mode switch
  is chosen.

  - The init behavior must make future AIT dogfood start from PRD/FSD/TDD, not from PRD/impl/task-only baseline placeholders.


  ### Acceptance Criteria


  - A fresh project can run an explicit new-model init flow and receive `docs/prd`, `docs/fsd`, and `docs/tdd` baseline directories.

  - The generated PRD and FSD files use `[PRD]` and `[FSD]` root chunk ids.

  - The generated baseline specgraph contains a `decomposes` edge from the PRD root chunk to the root FSD root chunk.

  - Running `ait reindex` after init preserves the generated chunks and graph information.

  - Running `ait specgraph validate-new-model` succeeds on the initialized baseline.

  - Existing tests for legacy init behavior continue to pass.

  - New tests cover fresh new-model init and incomplete-project behavior.


  ### Boundaries And Non-goals


  - v2.1 does not need to complete the project-docs rebuild itself.

  - v2.1 does not need to remove legacy `ait prd`, `ait impl`, or `ait task`.

  - v2.1 does not need to migrate historical v1.x project-docs data automatically.

  - v2.1 does not need to generate all final AIT PRD/FSD/TDD documents; it only needs to provide a valid new-model bootstrap
  path and lifecycle support.


  <!-- @id:prd-v21-init-mode-selection -->

  ## Init mode selection


  <!-- @summary: Users need a clear and safe way to choose new-model init without breaking existing legacy projects -->


  ### Overview


  The existing `ait init` command is used by legacy projects and should not silently change behavior in a way that breaks
  existing workflows. v2.1 needs a clear selection mechanism for new-model bootstrap.


  ### Business Rules


  - The init command must expose an explicit way to request PRD/FSD/TDD bootstrap.

  - The command should keep legacy behavior as the compatibility path for existing old-model projects.

  - If a project already has baseline documents, init must detect whether the existing shape is legacy, new-model, or incomplete.

  - The command output must report which init mode was applied.

  - The command output must list created files and validation status.


  ### Acceptance Criteria


  - Users can choose new-model init intentionally.

  - Legacy init remains stable for old projects.

  - New-model init reports created PRD/FSD/TDD files.

  - Re-running new-model init is idempotent for already-initialized new-model projects.

  - Incomplete new-model projects can be filled without overwriting existing user-authored files.


  ### Boundaries And Non-goals


  - v2.1 does not require automatic conversion from legacy baseline to new-model baseline.

  - v2.1 does not decide the final AIT product decomposition for every project.


  <!-- @id:prd-v21-project-docs-rebuild-readiness -->

  ## Project-docs rebuild readiness


  <!-- @summary: The new init path must support replacing the current legacy project-docs with a v2-compatible baseline later
  -->


  ### Overview


  After v2.1, AIT should be ready to rebuild its own `project-docs` into a v2-compatible PRD/FSD/TDD baseline. The old `project-docs`
  can then be archived as `project-docs-v1`, and the new `project-docs` can become the dogfood source for later versions.


  ### Business Rules


  - The new init path must be compatible with using PRD/FSD/TDD baseline documents as the active global project-docs state.

  - The new baseline must not require old `versions/*` history to operate.

  - Old history can be archived separately and must not be required for normal future dogfood.

  - Generated metadata must support future `fsd`, `tdd`, and `codegen` commands.

  - TDD target files should be interpreted as target artifact files, not only source code files.


  ### Acceptance Criteria


  - A new-model baseline can be used without legacy `docs/impl` as the primary implementation documentation layer.

  - Baseline TDD documents can point to source code, tests, skill markdown, templates, scripts, or other project artifacts.

  - `ait codegen prepare` can resolve baseline TDD context after initialization and reindexing.

  - The initialized metadata is suitable for a later project-docs baseline reset.


  ### Boundaries And Non-goals


  - v2.1 does not execute the project-docs directory swap.

  - v2.1 does not regenerate AIT source code from TDD.

  '
