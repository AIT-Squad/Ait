prd_draft: "<!-- @id:prd-v2-prd-fsd-tdd-parallel-model -->\n## v2.0 introduces parallel PRD/FSD/TDD model\n\n<!-- @summary:\
  \ v2.0 adds PRD/FSD/TDD as a parallel document model while keeping the old workflow available -->\n\n### 概述\n\nAIT currently\
  \ uses a PRD/impl/task workflow. v2.0 must keep that workflow available so v2.0 itself can be developed through current\
  \ AIT dogfood, while adding a new PRD/FSD/TDD model for later versions.\n\nThe target model separates intent, decomposition,\
  \ and code generation instructions:\n\n- PRD describes requirements: why and what.\n- FSD describes functional decomposition\
  \ and interaction contracts.\n- TDD describes the concrete technical implementation of one target code file.\n\n### 业务规则\n\
  \n- v2.0 development itself must use the current AIT PRD/impl/task flow.\n- v2.0 must introduce PRD/FSD/TDD as parallel\
  \ capability, not replace the old workflow immediately.\n- Existing `ait prd`, `ait impl`, and `ait task` commands remain\
  \ available.\n- New capability is exposed through `ait fsd`, `ait tdd`, and `ait codegen`.\n- v2.0 must not migrate historical\
  \ v1.x documents into the new PRD/FSD/TDD format.\n- Versions after v2.0 can start using the new PRD/FSD/TDD document format\
  \ and new AIT capability as the normal dogfood flow.\n\n### 验收标准\n\n- Existing v1.x PRD/impl/task commands and tests continue\
  \ to work.\n- v2.0 documents explicitly describe the PRD/FSD/TDD model, template contracts, command surface, codegen context\
  \ behavior, and merge compatibility.\n- AIT can parse and index PRD/FSD/TDD-style chunk ids while still accepting legacy\
  \ chunk ids.\n- AIT can represent PRD/FSD/TDD semantic relationships as specgraph edges.\n\n### 边界与非目标\n\n- v2.0's own PRD\
  \ and impl do not need to use the new PRD/FSD/TDD format.\n- v2.0 does not remove `ait impl` or `ait task`.\n- v2.0 does\
  \ not rewrite historical baseline or merged version documents.\n\n<!-- @id:prd-v2-fsd-tdd-structure-rules -->\n## PRD/FSD/TDD\
  \ structure and graph rules\n\n<!-- @summary: The new model must enforce chunk-level PRD/FSD/TDD hierarchy, naming, and\
  \ dependency rules -->\n\n### 概述\n\nThe target document model is a chunk graph:\n\n```text\nVersion\n  -> one PRD\n    \
  \  -> root FSD\n          -> recursive child FSD\n              -> leaf FSD\n                  -> one or more TDD\n    \
  \                  -> each TDD maps to one code file\n```\n\nFiles are physical containers. Chunks are the semantic unit.\
  \ Relationships are chunk-to-chunk specgraph edges.\n\n### 业务规则\n\n- Each version in the new model has exactly one PRD.\n\
  - Every PRD/FSD/TDD file must have a root chunk.\n- The root chunk represents the whole file and carries common file-level\
  \ context.\n- The root chunk does not replace internal semantic chunks.\n- A file may contain internal chunks for requirement\
  \ items, split items, or implementation detail blocks.\n- PRD root chunk maps to the root FSD root chunk with `decomposes`.\n\
  - Parent PRD/FSD files describe downstream FSD/TDD parts through internal split chunks.\n- Parent-child edges are emitted\
  \ from the parent internal split chunk, except for the PRD root to root FSD case.\n- `decomposes` is used for PRD/FSD to\
  \ FSD relationships.\n- `details` is used for FSD to TDD relationships.\n- `depends_on` is used only between sibling internal\
  \ split chunks inside the same parent FSD file.\n- FSD files may recursively decompose into child FSD files.\n- A leaf FSD\
  \ may detail one or more TDD files.\n- One FSD node must not mix child FSD and TDD children.\n- If a lower-level FSD needs\
  \ a dependency owned by a parent sibling, the dependency must be lifted to the parent split level.\n- Infrastructure capabilities\
  \ such as database, Redis, and message queue are modeled as normal FSD parts.\n\nNaming rules:\n\n- File name equals root\
  \ chunk id plus `.md`.\n- File name and root chunk id use `[PRD]`, `[FSD]`, or `[TDD]` prefixes.\n- `_` joins words inside\
  \ one semantic name.\n- `-` joins hierarchy levels.\n- Internal split chunk id uses `<parent_root_chunk_id>:<internal_split_chunk_name>`.\n\
  - Internal split chunk id must not use literal `:split` as a fixed suffix.\n- AIT must not infer semantic relationships\
  \ from chunk id or file name strings.\n- Normal AIT usage must create specgraph relationships explicitly when documents\
  \ are generated.\n\n### 验收标准\n\n- A validator can detect invalid edge types and invalid graph structures.\n- A validator\
  \ can reject FSD nodes that mix FSD children and TDD children.\n- A validator can reject `depends_on` edges that do not\
  \ connect sibling internal split chunks.\n- A validator can reject `depends_on` edges that point directly to downstream\
  \ root chunks.\n- A validator can reject parent-child edges emitted from the wrong source chunk.\n- Demo documents can represent\
  \ infrastructure as ordinary FSD capability and dependency.\n\n### 边界与非目标\n\n- v2.0 does not introduce file-level graph\
  \ edges.\n- v2.0 does not introduce additional trace relation types beyond `decomposes`, `details`, and `depends_on`.\n\
  - v2.0 does not decide FSD split depth automatically.\n\n<!-- @id:prd-v2-prd-fsd-tdd-template-contracts -->\n## PRD/FSD/TDD\
  \ template contracts\n\n<!-- @summary: v2.0 must deliver explicit PRD, FSD, and TDD template files matching the new document\
  \ model -->\n\n### 概述\n\nThe new PRD/FSD/TDD model needs concrete markdown templates that humans can audit and AIT can later\
  \ generate. These templates are part of the v2.0 requirement, not optional supporting notes.\n\nThe target template files\
  \ are:\n\n- `TEMPLATE-PRD-AIT-DRAFT.md`\n- `TEMPLATE-FSD-AIT-DRAFT.md`\n- `TEMPLATE-TDD-AIT-DRAFT.md`\n\n### 业务规则\n\nPRD\
  \ template:\n\n- Root chunk id uses `<!-- @id:[PRD]-{semantic_name} -->`.\n- Internal requirement chunk id uses `<!-- @id:[PRD]-{semantic_name}-{requirement_name}\
  \ -->`.\n- Root chunk includes background and problem, goals and measurement, scope, users and roles, assumptions and constraints,\
  \ and overall acceptance criteria.\n- Requirement chunks include user story, requirement description, business rules, user-visible\
  \ flow, exception scenarios, acceptance criteria, and open questions.\n- PRD writes why and what, not module decomposition,\
  \ technical design, or target code files.\n\nFSD template:\n\n- Root chunk id uses `<!-- @id:[FSD]-{semantic_name} -->`.\n\
  - Internal split chunk id uses `<!-- @id:[FSD]-{semantic_name}:{split_name} -->`.\n- Root chunk includes functional scope,\
  \ feature overview, common business rules, common definitions, interaction contract overview, data model contract, and non-functional\
  \ requirements.\n- Split chunks include functional description, boundary, business flow, business rules, provided interaction\
  \ contracts, input/output fields, failure codes or exceptions, call constraints, and data contracts.\n- FSD template content\
  \ defines interaction fields and interaction methods, but dependencies are expressed through specgraph instead of ordinary\
  \ prose management fields.\n\nTDD template:\n\n- Root chunk id uses `<!-- @id:[TDD]-{semantic_name} -->`.\n- TDD root chunk\
  \ includes a YAML-style `target_file: path/to/target_file.ext` declaration.\n- TDD root chunk includes technology stack,\
  \ implementation constraints, file responsibility, code structure, core logic, key data structures, algorithms and flow,\
  \ error handling, boundary conditions, and unit test requirements.\n- Optional internal implementation detail chunk id uses\
  \ `<!-- @id:[TDD]-{semantic_name}-{detail_name} -->`.\n- Unit test requirements must include test file path, framework,\
  \ normal path, boundary conditions, error path, mocks/fixtures, independent run command, passing standards, and failing\
  \ conditions.\n- Each TDD maps to exactly one target code file.\n\nTemplate exclusion rules:\n\n- Templates must not include\
  \ AIT-managed fields such as document state, change log, version metadata, hierarchy type fields, manual downstream-link\
  \ fields, manual linked-FSD/TDD fields, or specgraph hint fields.\n- Templates must not reintroduce task as a document layer.\n\
  - Relationship creation belongs to AIT-generated refs, metadata, and specgraph update actions.\n\n### 验收标准\n\n- The three\
  \ template files exist and use `[PRD]`, `[FSD]`, and `[TDD]` root chunk ids.\n- The FSD template shows internal split chunk\
  \ id format with `:<split_name>`.\n- The FSD template does not use literal `:split`.\n- The TDD template includes `target_file`\
  \ as markdown source of truth.\n- The TDD template includes passing standards and failing conditions for unit tests.\n-\
  \ The templates do not contain AIT-managed relationship or state fields.\n\n### 边界与非目标\n\n- v2.0 templates are target-format\
  \ templates for later versions, not the required format of v2.0's own PRD/impl files.\n- v2.0 does not require templates\
  \ to contain concrete downstream specgraph edges.\n- v2.0 does not require PRD internal requirement chunks to map one-to-one\
  \ to implementation chunks.\n\n<!-- @id:prd-v2-fsd-tdd-commands -->\n## Parallel FSD, TDD, and codegen commands\n\n<!--\
  \ @summary: v2.0 adds ait fsd, ait tdd, and ait codegen while preserving existing commands -->\n\n### 概述\n\nUsers need first-class\
  \ commands to create and manage FSD and TDD documents without overloading the old impl/task concepts. The new commands should\
  \ coexist with the existing workflow so v1.x projects remain usable while v2.x projects can start adopting the new model.\n\
  \n### 业务规则\n\n- `ait fsd` manages FSD documents and FSD decomposition.\n- `ait tdd` manages TDD documents and target file\
  \ implementation instructions.\n- `ait codegen` prepares code generation context from a TDD root chunk.\n- New commands\
  \ must write version-side files under `versions/<version>/fsd` and `versions/<version>/tdd` for new-model work.\n- New commands\
  \ must create chunk records in version chunks-index.\n- New commands must create or update specgraph edges explicitly as\
  \ documents are generated.\n- New commands must not remove or change the behavior of `ait prd`, `ait impl`, or `ait task`.\n\
  \n### 验收标准\n\n- CLI help exposes `fsd`, `tdd`, and `codegen` command groups.\n- FSD command flow can create or update an\
  \ FSD markdown file with a root chunk and internal split chunks.\n- TDD command flow can create or update a TDD markdown\
  \ file with a root chunk and target file declaration.\n- Codegen command flow accepts a TDD root chunk id and returns a\
  \ focused context bundle.\n- Existing end-to-end PRD/impl/task tests continue to pass.\n\n### 边界与非目标\n\n- v2.0 does not\
  \ remove the existing task YAML implementation.\n- v2.0 does not require old impl documents to be rewritten as TDD documents.\n\
  - v2.0 does not execute AI code generation directly inside the CLI unless an existing AIT pattern already supports that\
  \ safely.\n\n<!-- @id:prd-v2-codegen-tdd-context -->\n## TDD-based code generation context\n\n<!-- @summary: Code generation\
  \ starts from a TDD root chunk and gathers upstream and dependency context through specgraph -->\n\n### 概述\n\nThe target\
  \ model removes task as the new code generation unit. A TDD root chunk represents the implementation instruction for one\
  \ concrete target code file. The code generation context must be assembled by traversing chunk-level relationships from\
  \ that TDD root.\n\n### 业务规则\n\n- Each TDD maps to exactly one target code file.\n- TDD markdown must specify `target_file`;\
  \ metadata may redundantly index it, but markdown is the source of truth.\n- TDD must include unit test requirements with\
  \ passing and failing conditions.\n- TDD context assembly starts from the TDD root chunk.\n- Context assembly includes the\
  \ TDD file's internal implementation chunks.\n- Context assembly recursively collects upstream FSD and PRD chunks needed\
  \ to understand requirements and functional contracts.\n- Context assembly follows the parent internal split chunk to find\
  \ sibling `depends_on` edges.\n- Dependency context is collected through sibling split chunks and their downstream root\
  \ chunks.\n- TDD context assembly must not infer dependencies from names.\n\n### 验收标准\n\n- Given a valid TDD root chunk,\
  \ `ait codegen` returns the target file path.\n- Given a valid TDD root chunk, `ait codegen` returns the TDD root and internal\
  \ implementation chunks.\n- Given a valid TDD root chunk, `ait codegen` returns relevant upstream FSD/PRD chunks.\n- Given\
  \ sibling `depends_on` relationships, `ait codegen` includes dependency contracts required by the target TDD.\n- Unit tests\
  \ cover at least one multi-level FSD to TDD context traversal.\n\n### 边界与非目标\n\n- v2.0 does not require the CLI to edit\
  \ source code directly.\n- v2.0 does not make task YAML the source of truth for new-model code generation.\n- v2.0 does\
  \ not allow one TDD to target multiple code files.\n\n<!-- @id:prd-v2-version-merge-compatibility -->\n## Version and merge\
  \ compatibility\n\n<!-- @summary: v2.0 must merge new PRD/FSD/TDD documents at chunk level while preserving old baseline\
  \ behavior -->\n\n### 概述\n\nAIT must continue to provide versioned document development and baseline merge. The new PRD/FSD/TDD\
  \ model should participate in the same chunk-level add/modify/delete lifecycle without breaking existing historical data.\n\
  \n### 业务规则\n\n- New PRD/FSD/TDD files in a version are not one-off drafts.\n- After confirm and merge, new-model documents\
  \ must update the global baseline current state.\n- Merge must remain chunk-based.\n- chunks-index and specgraph must be\
  \ rebuilt or updated after merge.\n- v1.x PRD baseline single-file behavior must not accidentally swallow FSD/TDD files.\n\
  - New-model PRD/FSD/TDD baseline files should preserve their intended file containers.\n- Backward compatibility must allow\
  \ old baseline chunks and new-model chunks to coexist.\n\n### 验收标准\n\n- Version merge can promote FSD and TDD chunks into\
  \ baseline docs without forcing them into `docs/prd/global.md`.\n- Version merge can preserve specgraph edges for `decomposes`,\
  \ `details`, and `depends_on`.\n- Legacy confirm behavior still passes existing tests.\n- New tests cover merge of at least\
  \ one FSD file and one TDD file.\n- New tests cover mixed legacy baseline data and new-model version data.\n\n### 边界与非目标\n\
  \n- v2.0 does not rewrite historical `.meta` files except through normal version operations.\n- v2.0 does not delete old\
  \ task metadata.\n- v2.0 does not require all projects to switch to new-model confirm rules immediately.\n"
