prd_draft: "<!-- @id:prd-v13-state-skill -->\n\n# 目标3：ait-state Skill（版本进度面板）\n\n## 需求来源\n\n用户明确要求：\n\n> 有一个版本的完成进度和信息汇总，放到版本下，命名为\
