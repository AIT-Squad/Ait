  \ skill 被调用 → 更新 impl 规划进度\n      │\n      ▼\n... （未来 v1.4+）task 拆分 → 开发进度 ...\n      │\n      ▼\n【刷新】ait-state skill 被调用\
  \ → 更新开发进度\n      │\n      ▼\nversion merge v1.3\n      │\n      ▼\n【最终刷新】ait-state skill 被调用 → 生成最终 state.md（含完整进度汇总）\n\
  ```\n\n### state.md 的三阶段内容\n\n| 阶段 | 内容 | 数据来源 |\n|---|---|---|\n| Phase 1：PRD 规划中 | 版本元信息 + PRD chunk 三态分布（working/staged/committed）+\
