  \ 终端输出与 `state.md` 内容一致\n5. `bin/ait state --save` 成功写入 `versions/<v>/state.md`\n6. `bin/ait prd commit` 后自动刷新 `state.md`（验证自动触发）\n\
  \n## 非目标（本期不做）\n\n| 非目标 | 留给后续 |\n|---|---|\n| state.md 的 Web UI 展示 | 不在 CLI 工具范围内 |\n| 历史版本 state.md 的 diff 对比 | v1.4+\
