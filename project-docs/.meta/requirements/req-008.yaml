  \ 体系未引入（留 v1.4+）\n- 语义搜索（embedding）未实现（留 v1.4+）\n```\n\n## ait-state Skill 设计\n\n### 文件位置\n\n`skill/ait/sub-skills/ait-state/SKILL.md`（新增子\
  \ skill）\n\n### 触发语\n\n```\nINVOKE THIS SKILL when the user types `/ait state` or after any `version merge` operation to\
  \ display the current version's progress panel (PRD distribution, impl coverage, health score).\n```\n\n### 行为流程\n\n```\n\
  用户调用 /ait state\n        │\n        ▼\n【Step 1】读取版本元信息\n        └── cat .meta/versions/<current>.yaml\n        │\n     \
  \   ▼\n【Step 2】读取 chunks-index\n        └── load .meta/chunks-index-<current>.yaml\n        │\n        ▼\n【Step 3】读取 SpecGraph（如有）\n\
  \        └── load .meta/specgraph.yaml\n        │\n        ▼\n【Step 4】计算三态分布 + 覆盖率 + 健康度\n        │\n        ▼\n【Step 5】渲染\
  \ state.md 内容（输出到终端 + 可选写入文件）\n        │\n        ▼\n【Step 6】询问用户：是否写入 versions/<v>/state.md？\n        └── y → bin/ait state\
  \ save（写入文件）\n        └── n → 仅终端显示\n```\n\n### CLI 接口\n\n| 命令 | 用途 |\n|---|---|\n| `bin/ait state` | 显示当前版本状态（终端输出） |\n\
  | `bin/ait state --save` | 显示并写入 `versions/<v>/state.md` |\n| `bin/ait state --version v1.2` | 查看指定版本状态 |\n| `bin/ait state\
  \ --format json` | JSON 格式输出（供 AI 解析） |\n\n### 自动触发时机\n\n| 触发事件 | 是否自动调用 ait-state |\n|---|---|\n| `bin/ait prd commit`\
