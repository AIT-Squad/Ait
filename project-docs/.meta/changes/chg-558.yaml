new_content: '<!-- @id:[FSD]-ait-version:version_manager -->

  ## version_manager

  ### 功能描述

  VersionManager 类,版本全生命周期的编排者。职责:版本元数据与索引的创建读写;chunk 三态流转与 commit 锁定(锁定后修改报错,uncommit 可把 committed/staged 打回 working 作层级返工);纯门禁
  gate——汇集 task 完成度、重复/改名冲突、六不变式(①PRD↔1FSD ②TDD↑1FSD↓1制品 ③制品↔1TDD ④关联经真实 chunk ⑤无孤儿 ⑥制品可追溯到 PRD)与制品验收(配置的测试命令)的校验报告,可重复跑、零落盘;原子
  confirm——同一套门禁前置,通过后备份 docs 与 .meta 关键状态、逐文件合并 chunk、提升关系图入基线、git 提交,任一步失败按字节还原并报 MERGE_ROLLBACK,成功则版本标记 merged;reset 物理清空未合入版本。git
  提交三分语义:非 git 环境容忍(结果标 git:"unavailable")、无变更时返回当前 HEAD、真实失败进回滚路径(不伪装成功)。


  ### 反向要求

  - 不做 chunk 内容合并的具体算法(委托 merge_engine)。

  - 不校验 chunk 语法(委托 doc_model 域的解析器)、不计算六不变式细节(委托 new_model 域的校验器,本类只编排调用与拒绝)。

  - 不直接被其它域实例化用于合并以外的用途(其它域经域契约使用)。'
