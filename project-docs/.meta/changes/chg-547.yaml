base_content: '<!-- @id:[PRD]-ait -->

  ## ait 产品 PRD


  ### 概述


  AIT 是面向 AI 协作的"类 Git"文档版本管理与实现编排工具,服务 vibe coding 下 PRD/设计文档到代码的协作与版本管理,打包为开源 Claude Code Skill。它解决传统 Git 的三点不足:不够细粒度(以
  `<!-- @id -->` 标注的 chunk 为单位,而非文件/行)、不够语义化(把 PRD↔FSD↔TDD↔代码的关联显式建模)、不够 AI 友好(能沿关系为 codegen 组装聚焦上下文)。核心价值:让 AI 参与的规格与代码始终同源、可门禁、可回退、可追溯。


  ### 范围


  **In scope**:chunk 级三态版本控制与全有或全无的原子版本;新模型主线 `PRD → FSD(递归分解)→ TDD(一文件一映射)→ codegen → 代码`;spec→代码的可追溯;FSD 分区支持并行开发;六不变式的代码级强制;制品验收门禁。**Out
  of scope**:多人实时协作锁;反向 code→spec 追溯;非 markdown 文档纳管;chunk 级删除与 legacy 流程退役(后续能力)。


  ### 目标与度量


  | 目标 | 衡量方式 | 目标值 |

  |---|---|---|

  | 可追溯(目标1) | 从任一叶 TDD 经 codegen 拿到 target_file + 上溯全链上下文 | 1 跳可达 |

  | 可隔离(目标2) | FSD 分区使不同人/agent 落不同文件 | 0 文件冲突(target_file 唯一性强制) |

  | 原子性 | 版本 merge 全有或全无 | 失败字节级可回退 |

  | 自包含 | skill 安装到任意项目即可用 | 0 对 AIT 自身 project-docs 的运行依赖 |


  ### 反向要求


  - 不做多用户实时协作锁(单用户本地版本控制)。

  - 不做反向 code→spec 追溯(只保证 spec→代码正向可追溯)。

  - 不纳管非 markdown 文档。

  - 本 PRD 不描述实现细节(实现分解归 FSD、文件级设计归 TDD);不承载 chunk 间关系声明(关系只存于 SpecGraph)。'
