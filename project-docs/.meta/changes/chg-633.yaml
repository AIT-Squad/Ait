base_content: '<!-- @id:[TDD]-skill_manifest -->

  ## skill_manifest TDD


  ```yaml

  target_file: skill/ait/SKILL.md

  ```


  ### 技术栈


  Markdown（Claude Code Skill 指令文档）。


  ### 文件职责


  AIT skill 主清单（Claude 的 AIT 使用指令）。新模型为主叙事：开篇 Pipeline 以 prd(新模型)/fsd/tdd/codegen 为主线，旧 prdv1/impl/task 标 legacy；全局契约（CLI
  入口、JSON 输出、project-docs 唯一权威、术语 chunk）；命令速查表新模型在前；**版本原子性心智模型（v2.22 命令面）：`version create` 显式开版本（或 `prd create` 无活动版本时自动开版本——迭代流转入口）→
  逐层构建（写时门禁即时拦非法关联；`prd confirm` 冻结 PRD 层/`prd revert` 成对返工，phase 阶段机起点；`fsd create` 写模块文档〔split 内 yaml `depends_on: [兄弟]`
  声明依赖，随文件对账〕、`fsd decompose` 拆分即建边〔取代 link〕、`fsd confirm/revert` 层级冻结-返工；`tdd create --parent` 创建即建 details 边、`tdd confirm/revert`
  层级冻结-返工；四层命令面合龙 prd→fsd→tdd→codegen）→ `version confirm` 纯门禁可重复跑（六不变式 + 制品验收报告，零落盘）→ `version merge` 唯一原子落盘（门禁+验收前置，失败字节级回退）→
  `version revert --confirm` 任意阶段整版退出（未合入版本；无局部撤销）。速查表 version 行 = create|commit|confirm|merge|revert|status，prd 行 = create(自动开版本)|confirm|revert〔link
  已退役〕，fsd 行 = create|decompose|confirm|revert，tdd 行 = create(--parent 建 details)|confirm|revert，codegen 行 = prepare，acceptance
  行 = run|set（link 退役）；pitfalls 中 LOCKED/整版重置引用 revert（reset 已更名）**；sub-skills 路由索引；common pitfalls（v2.27 增：`USAGE_ERROR`=命令/参数拼写错误仍返回
  JSON；`INVALID_FILE_NAME`=--file 只接受 kind 目录内相对索引路径；`GIT_COMMIT_FAILED`=merge 的 git 提交失败已自动回滚可重试）；scope boundaries。


  ### 单元测试要求


  skill 文档无单测；由 sub-skill 触发与 CLI 契约间接验证。'
