  # ait-state Skill 与 state.md 实现


  ## 目标


  新增版本状态面板能力，在版本创建、PRD/impl commit 和 merge 后展示或刷新 `versions/<v>/state.md`。


  ## 交付物


  - `skill/ait/sub-skills/ait-state/SKILL.md`：AI 驱动的状态面板子 skill。

  - `ait/state.py`：状态数据计算与 Markdown 渲染模块。

  - `bin/ait state`：显示当前或指定版本状态。

  - `bin/ait state --save`：写入 `versions/<v>/state.md`。


  ## 数据来源


  | 数据 | 来源 |

  |---|---|

  | 版本元信息 | `.meta/versions/<v>.yaml` |

  | PRD/impl 三态分布 | `.meta/chunks-index-<v>.yaml` |

  | PRD→impl 覆盖 | `.meta/specgraph.yaml`，缺失时回退到 `links-index.yaml` |

  | merge 摘要 | version merge 结果与变更记录 |


  ## state.py 职责


  - `load_version_state(version)`：读取版本元信息和 chunk index。

  - `compute_distribution(chunks)`：计算 working/staged/committed 分布。

  - `compute_impl_coverage(graph, chunks)`：计算 PRD→impl 覆盖。

  - `render_markdown(state)`：渲染 `state.md`。

  - `save_state(version, markdown)`：仅由 CLI 调用写入文件。


  ## CLI


  ```text

  bin/ait state [--version vX.Y] [--save] [--format markdown|json]

  ```


  默认输出 Markdown 到终端；`--save` 才写入版本目录。


  ## 自动刷新


  - `prd commit` 后调用状态刷新，更新 PRD 分布。

  - `impl commit` 后调用状态刷新，更新 impl 覆盖。

  - `version merge` 后调用状态刷新，生成最终面板。


  ## 验收


  - 版本目录存在 `state.md` 初始版本。

  - `bin/ait state --save` 能写入或刷新 `versions/<v>/state.md`。

  - `bin/ait state --format json` 输出供 AI 解析的结构化结果。

  - `ait-state/SKILL.md` 不直接写文件，只调用 `bin/ait state --save`。


