base_content: '<!-- @id:[FSD]-ait-cli -->

  ## cli 内部分解


  ### 功能描述

  cli 域的实现分解。该域是 ait 的命令行分发器:用 click 定义命令树,把用户命令路由到各领域 manager,并统一输出契约。核心原则是"只分发不含业务逻辑"——每个命令解析参数、调对应 manager、把结果包成统一 JSON
  输出,业务规则全在各领域(version/new_model/foundation 等)。实现为单一文件:cli(click 命令树 + 输出契约 + 项目根解析)。


  ### 反向要求

  - 不含任何业务逻辑(版本合并、图校验、文档解析等全部委托对应领域 manager,本域只做参数解析与结果包装)。

  - 不直接读写 project-docs 文件(经 manager 与 foundation 的原子写)。

  - 本文件不定义域对外公共接口(域契约在顶层文件 [FSD]-ait 的 cli 域块,本文件是内部实现分解)。


  ### 分解视图

  - cli 叶(details → [TDD]-cli):click 命令树、JSON 输出契约、项目根解析'
