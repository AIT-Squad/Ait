new_content: '<!-- @id:[FSD]-ait-doc_model:chunk_parser -->

  ## chunk_parser

  ### 功能描述

  chunk 级 markdown 解析器。chunk 边界由 `<!-- @id:xxx -->` 注释而非标题层级决定。识别五类标记:@id(chunk 起点)、@ref(chunk 间关系引用)、@extract(动态 global 提取块)、@summary(chunk
  摘要)、@prd-no-impl(标记无需实现)。code-fence(``` 或 ~~~)内的内容被屏蔽以避免把示例里的 @id/@ref 误当真标记。file_header 是首个 @id 之前的内容;@ref 归属它所在的 chunk;@extract
  成对解析,嵌套或未闭合报 ExtractError。chunk id 同时支持 legacy 命名与 [PRD]/[FSD]/[TDD] 前缀两类。产出冻结数据类 ParsedFile(file, file_header, chunks,
  refs),其中 Chunk 带 id/heading/level/content/行号范围/no_impl/summary,Ref 带 source_chunk_id/target_file/target_chunk_id/rel。


  ### 反向要求

  - 不建立关系图(只抽出 @ref 原始数据,建边归 specgraph 域)。

  - 不校验六不变式或图合法性(只做语法解析,语义校验归 new_model 域)。

  - 不写文件(纯读入文本→结构,落盘归 foundation)。'
