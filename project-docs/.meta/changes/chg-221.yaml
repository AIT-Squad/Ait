  ## init FSD

  ### 功能范围

  `ait init` 项目初始化：旧 global 基线 bootstrap、新模型 prd/fsd/tdd 骨架(--new-model)、wrapper/config 生成、增量补全与幂等、--refresh-wrapper。

  ### 交互契约

  `run(*,check_only,skip,new_model,project_name) -> InitResult`；`refresh_wrapper()`。'
