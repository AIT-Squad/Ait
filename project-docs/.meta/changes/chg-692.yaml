new_content: '<!-- @id:[FSD]-ait-init:TEST -->

  ## TEST 集成验收

  init 域(init_manager)作为整体的集成验收:

  1. WHEN 在空的合法项目根跑 `run(new_model=True, project_name="demo")` THEN 生成 docs/{prd,fsd,tdd} 骨架、[PRD]-demo 与 [FSD]-demo 根 chunk
  进入基线、二者间 decomposes 边入 specgraph,返回 InitResult 且 chunks>0。

  2. WHEN 对已初始化项目重跑 init THEN 幂等——已存在文件不被覆盖,只补缺失项;check_only=True 时只报告 status 不写盘。

  3. IF project_name 含非法字符或路径穿越(如 `../x`)THEN 报 INVALID_PROJECT_NAME,不产出任何文件。

  4. IF bootstrap 后根 chunk 未能进入基线 THEN 报 BOOTSTRAP_FAILED(不返回静默成功的空基线)。

  5. WHEN refresh_wrapper() THEN 仅重写项目本地 wrapper,不动 docs 与基线。

  6. WHEN init 完成 THEN project-docs/.git 存在(独立 docs 仓);宿主根 .gitignore 含 project-docs/ 行;project-docs/.gitignore 含 versions/*/state.md。重跑
  init 幂等,不重复追加。'
