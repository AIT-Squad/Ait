new_content: "<!-- @id:[FSD]-ait:skill -->\n## skill 分发资产域\n\n### 功能描述\nAIT 的 AI 使用面:SKILL.md 主清单(Claude 的 AIT 使用指令与命令速查)、6\
  \ 个 sub-skills(状态面板/错误恢复/初始化引导等)、3 个文档模板(TEMPLATE-{PRD,FSD,TDD}-AIT-DRAFT.md,三类分化:PRD 问题空间/FSD 结构与契约/TDD 文件级实现)、7 个 references\
  \ 参考资产(new-model-format 权威格式规范等)。全部为生成目标(target_file 指向分发文件)。内部分解见 [FSD]-ait-skill。\n\n### 能力契约\n- **提供方式**:随 skill 安装分发的\
  \ markdown 资产(~/.claude/skills/ait/)\n- **接口**(文档契约):\n  - SKILL.md——命令面权威速查、全局契约(入口 wrapper、JSON 输出、术语)、pitfalls\n  - templates/TEMPLATE-{PRD,FSD,TDD}-AIT-DRAFT.md——三类文档的章节骨架(PRD:概述/范围/角色/目标/需求项+验收;FSD:功能描述/反向要求/分解视图/能力契约/:TEST;TDD:target_file/技术栈约束/文件职责/代码结构/实现逻辑/错误边界/单测)\n\
  \  - references/new-model-format.md——格式权威规范(ID 语法/三关系/六不变式/生命周期/错误码全表)\n- 更新纪律:代码行为变更须同步 SKILL.md 与相关 references(经 TDD spec\
  \ 驱动)\n\n### 反向要求\n- 不含可执行代码(纯 markdown 资产;行为强制在代码侧门禁)。\n- 模板不承载关系声明示例以外的关系语法(文档正文零关系原则)。"
