  ## version_manager

  ### 功能描述

  VersionManager 编排版本全生命周期：三态流转、commit 锁定、uncommit 层级返工、纯门禁 gate（可重复跑零落盘）、原子 confirm（precheck〔task/git/去重/**六不变式门禁**〕→backup→merge→extract→specgraph
  提升→git commit，失败 restore 字节级回退）、reset 物理删除。create/ensure 只建 meta+index，工作区子目录按需创建。详见 [TDD]-version_manager。'
