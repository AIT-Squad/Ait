new_content: '<!-- @id:[FSD]-ait-version -->

  ## version FSD


  ### 功能范围


  版本生命周期与基线合并：版本创建/三态提交(working→staged→committed)/锁定/原子 confirm(两阶段+回退)/reset；chunk 级 merge。版本是「全有或全无」原子单元。


  ### 交互契约


  - 生命周期：`create/ensure/list_versions/current`；meta 读写。

  - 三态：`add_chunk(upsert)/remove_chunk/stage/unstage/commit/status`。

  - 锁定：`lock_prd/lock_impl/assert_*_writable/set_title`。

  - 合并：`pre_merge_check/merge/confirm`（confirm 守卫 task 全 done + git 干净 → 合入基线 → 提取动态 global → 提升 specgraph → git commit；失败回退）。

  - 逃生：`reset(--confirm)` 物理清空版本。'
