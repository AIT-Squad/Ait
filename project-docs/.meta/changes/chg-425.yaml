new_content: '<!-- @id:[TDD]-template_prd -->

  ## template_prd TDD


  ```yaml

  target_file: skill/ait/templates/TEMPLATE-PRD-AIT-DRAFT.md

  ```


  ### 技术栈


  Markdown（随 ait skill 分发的格式资产）。


  ### 文件职责


  新模型 PRD 文档模板（v2.35 三类分化定稿:PRD=问题与价值,零技术）。结构:root(概述/范围〔含+不含〕/用户与角色/目标与度量/依赖与风险)+ 需求项 split(用户故事+用户级验收标准 WHEN/THEN)。**三条通用书写规约(模板注释明示)**:①功能描述详实自包含,禁"参见/详见
  X"式甩锅;②每个层级含**反向要求**——明确不解决的用户问题/排除的场景(范围"不包含"即 PRD 的反向要求位);③**术语就地展开**——总结性用语(如"六不变式")在使用处展开其完整含义,不裸用名词、不指向别处。零技术词汇(不写文件/函数/技术栈)。


  ### 单元测试要求


  无单测；格式规则的强制由 new_model_validator / chunk_parser 代码侧承担，本文件是人读规范/模板。'
