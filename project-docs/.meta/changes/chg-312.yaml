base_content: '<!-- @id:[TDD]-specgraph -->

  ## specgraph TDD


  ```yaml

  target_file: skill/ait/ait/specgraph.py

  ```


  ### 技术栈

  Python 3.10+；`dataclasses`、`pathlib`、`yaml`(经 io_utils 原子写)；依赖 `chunk_parser`(parse_file)、`index_manager`、`io_utils`。


  ### 数据结构（@dataclass）

  - `Spec{uri, chunk_id, title, type, version, file, metadata:dict}`。

  - `Edge{src, dst, rel, weight=1.0, metadata:dict}`。

  - `SpecGraph{specs:dict[uri,Spec], edges:list[Edge]}`。

  - `ViewNode{chunk_id, type, version, file, title, uri}`——version/file/uri 取"获胜来源"（版本覆盖 baseline）。

  - `ViewEdge{src, dst, rel, metadata:dict}`——src/dst 为 **chunk_id**。

  - `CombinedView{nodes:dict[chunk_id,ViewNode], edges:list[ViewEdge]}`。


  ### URI 体系

  `spec:{type}:{version}:{chunk_id}`（type∈prd/impl/fsd/tdd/global/task；version="baseline" 或 vX.Y）。`make_uri/parse_uri/spec_type`(由
  file 位置/前缀定 type)。URI 仅为存储与旧查询面；**跨 baseline∪版本的身份语义以 chunk_id 为准**（组合视图）。


  ### 代码结构（SpecGraph 方法）

  - `load(path)`(classmethod，从 yaml 读 specs/edges)、`save(path)`(原子写)。

  - `add_spec/add_edge(src,dst,rel,weight,metadata)`。

  - `query(uri,*,direction="out",rel=None)`、`dependencies`、`implementations`、`impacted(uri)`(反向可达闭包)、`detect_cycle(*,rels)`、`implements_of(prd_chunk_id,version)`。

  - `dry_run_merge(other)->SpecGraph`(内存合并 baseline+version 供查询)、`merge_into_baseline(version)`(把版本边/spec 提升进 baseline)、`export_dot()`。


  ### 代码结构（CombinedView 方法）

  - `node(chunk_id)->ViewNode|None`；`edges_from(chunk_id, rel=None)`、`edges_to(chunk_id, rel=None)`。

  - `impacted(chunk_id)->list[str]`：BFS 传递闭包——**正向** decomposes/details 边＋**id 结构子**（冒号 split 隶属其根：`X:*` 是 `X` 的下游，根到 split
  无显式边）＋**反向** depends_on/implements 边（依赖方）；去重、不含起点、按发现序。

  - `detect_cycle(*, rels)->list[str]|None`：在坍缩后的 chunk_id 边集上 DFS；rels 显式传入（如 {"depends_on"}）。**baseline 与版本合并后才成环的图（audit
  R2-02）在视图上直接可检**。


  ### 模块函数（核心算法）

  - `specgraph_path(root,version)`、`load_specgraph(root,version="baseline")`、`combined_specgraph(root,version=None)`(baseline
  + 可选版本 dry_run_merge)。

  - `combined_view(root, version=None) -> CombinedView`：读 baseline 图＋（存在则）版本图；**节点**＝baseline specs 按 chunk_id 建 ViewNode，版本
  specs 同 chunk_id 覆盖（modify 的 chunk 内容来源指向版本）；**边**＝两图边端点 URI→chunk_id（specs 查得则取 spec.chunk_id，否则 parse_uri 兜底），按 (src,dst,rel)
  去重；**任一端点无对应节点的悬空边丢弃**（写侧完整性由校验器负责）。存储格式不变，无数据迁移。

  - `sync_specgraph(root)`：**从所有 docs/ 与 versions/ 的 markdown 重建图**——parse_file 取 chunks/refs，按 file 位置定 type 建 Spec，@ref
  建 Edge；然后 `_preserve_explicit_edges(previous,current)` 把上一版图里**非 @ref 来源（fsd link/add_edge，metadata source）的显式边**搬回 current（保证
  reindex 不丢 CLI 加的 decomposes/details/depends_on）。

  - `_global_category(chunk_id,file)`、`resolve_chunk_uri(root,chunk_id_or_uri,version,*,graph)`(chunk id→URI，version 优先)、`_preferred_uri`、`add_edge(root,src,dst,rel)`。


  ### 关键约定

  markdown @ref 是声明式边的来源；CLI 显式边靠 _preserve_explicit_edges 跨 reindex 存活；baseline 与 per-version 分文件，combined 供查询；**被 modify
  进版本的 chunk 在组合视图中保有 baseline 期建立的全部关系（消除 URI 二象性——上一形态下版本节点无边，codegen/deps/impact 对"正在被修改的 chunk"全部失效）**。


  ### 边界条件

  combined_view(version=None) 等价纯 baseline 视图；版本图文件不存在时同 None；同一 chunk_id 在两图中 type 不一致时以版本为准；空图返回空视图；detect_cycle 对自环（X→X）同样报出。


  ### 单元测试要求

  `tests/test_specgraph*.py`、`test_specgraph_orphan_guard.py`：建图、URI 解析、impacted/cycle、dry_run_merge、显式边经 sync 保留；组合视图——版本覆盖（modify
  chunk 的 ViewNode.version/file 指向版本）、baseline 边在 chunk_id 世界对被 modify chunk 可见、(src,dst,rel) 去重、悬空边丢弃、合并后才成环（R2-02 场景：baseline
  B→A depends_on ＋ 版本 A→B）在视图上报出、impacted 含 decomposes/details 正向下游、id 结构子（根→冒号 split 无边也纳入）与 depends_on 反向依赖方。pytest。'
