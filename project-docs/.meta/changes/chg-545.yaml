base_content: '<!-- @id:[TDD]-cli -->

  ## cli TDD


  ```yaml

  target_file: skill/ait/ait/cli.py

  ```


  ### 技术栈

  Python 3.10+；click、json；导入分发到全部 manager。


  ### 实现约束

  只分发不含业务逻辑：每命令解析参数→调 manager→ok/fail 输出 JSON；stdout 必须单个 JSON(Windows reconfigure utf-8)。


  ### 代码结构

  - 输出契约：ok(data)→{ok:true,data}；fail(message,code,exit_code,details)→{ok:false,error,code}+sys.exit；_json_safe(datetime/dataclass/pydantic
  序列化)。

  - _read_content/_scoped_filename/_root(ctx)/_emit_wrapper_hints。

  - main click group：resolve_project_root 存 ctx。

  - 命令组：init；prdv1(旧模型 create/save-draft/confirm/commit/show/resolve-candidates)；prd(新模型 **create〔无活动版本自动开版本 next_version_name+version
  create，输出含 version〕/confirm〔PRD 层冻结：锁 PRD chunk+phase→prd-confirm〕/revert〔成对返工：解锁回 working+phase→prd-creating〕**；**link
  已退役——三种关系全部随内容创建原子出生：depends_on 随 fsd create 的 split 内 yaml 声明、decomposes 随 fsd decompose、details 随 tdd create --parent；add_edge
  为纯内部原语**)；impl；task；**version(create/confirm/merge/revert + legacy status/commit)**；fsd(**create/decompose〔拆分即建边：原子写子 FSD+建
  decomposes 边，取代 link〕/confirm〔FSD 层冻结 phase→fsd-confirm〕/revert〔成对返工 phase→fsd-creating〕**；link 退役)；tdd(**create〔可 --parent
  <fsd_split>：原子建 details 边，创建即建边〕/confirm〔TDD 层冻结 phase→tdd-confirm〕/revert〔成对返工 phase→tdd-creating〕**)；codegen(prepare)；**acceptance(run〔跑配置的验收命令并回显〕/set〔写
  config.yaml acceptance_command〕)**（init 透传 InitManagerError.code：**INVALID_PROJECT_NAME/BOOTSTRAP_FAILED** 等，不再笼统 INIT_FAILED）；specgraph(含
  validate-new-model)；context/state/lint/search/deps/impact/reindex/baseline-summary/migrate-block-to-chunk。

  - **version 命令语义（新模型主线四件套）**：`create <v>`（显式开版本，已存在报错，堵幽灵版本）；`confirm <v>`（**纯门禁**——调 `mgr.gate`，报告 passed + 六不变式违例明细，可重复跑、零落盘、不合入）；`merge
  <v>`（**原子合入**——调 `mgr.confirm`，内部先过同一门禁再 backup→merge→specgraph 提升→git commit，失败字节级回退；旧 `--conflict-policy` 保留）；`revert
  <v>`（调 `mgr.reset`，`--confirm` 二次确认物理清空未合入版本）。legacy `commit`（三态锁定）与 `status` 保留。


  ### 错误处理

  捕 ValidationError/VersionManagerError/各 Error→fail(code)；根错误在 main 抛。**JSON 契约全覆盖（审计 R3-05）：main 为 JsonGroup 子类——click UsageError（未知命令/缺参/非法
  Choice）不再裸 usage 文本，改输出 `{ok:false,error,code:"USAGE_ERROR"}` 后 exit 2；其余 ClickException → `code:"CLI_ERROR"`；--help/Exit/Abort
  行为不变。stdout 永远是单个 JSON 或帮助文本。**


  ### 单元测试要求

  tests/test_e2e_cli.py、test_new_model_commands.py：命令路由、JSON 契约、prd/prdv1 重命名、各域 happy/error；**version/prd/fsd 四件套路由与契约（见前）；tdd
  create --parent 原子建 details 边、tdd confirm/revert 成对；端到端 prd→fsd→tdd→codegen 四层命令面合龙走通；acceptance run/set 路由与 JSON 契约（set
  写配置、run 回显 passed/skipped）；prd link 已移除（no-such-command）；fsd/tdd create 对不存在版本报 VERSION_NOT_FOUND；USAGE_ERROR JSON 化（未知命令/缺参/非法
  Choice 三形态）、--help 仍输出帮助文本；init 非法 --name 返回 INVALID_PROJECT_NAME JSON**。pytest。'
