new_content: '<!-- @id:[FSD]-ait:TEST -->

  ## TEST 系统级集成验收


  ait 全部域(foundation/doc_model/indexing/specgraph/version/new_model/cli/init/skill + legacy)合并到一起、作为完整系统的端到端集成验收:


  1. WHEN 在空项目 `ait init --new-model --name demo` → `prd create`(讨论出带 chunk 的 PRD)→ `prd confirm` → `fsd create`+`fsd decompose`(逐层分解,split
  内声明依赖)→ `fsd confirm` → `tdd create --parent`(叶子细化,绑 target_file)→ `tdd confirm` → `codegen prepare` THEN 每步 stdout 为单个
  JSON;关系边(decomposes/details/depends_on)随内容创建原子出生并只存于 SpecGraph(文档正文零关系声明);codegen 返回 TDD+上溯全链+依赖契约的完整上下文包。

  2. WHEN 上述版本 `version commit` → `version confirm` THEN 门禁汇报六不变式(①PRD↔1FSD ②TDD↑1FSD↓1制品 ③制品↔1TDD ④关联经真实 chunk ⑤无孤儿 ⑥制品可追溯到
  PRD)零违例与制品验收结果,可重复跑零落盘;`version merge` THEN 原子合入基线+一次 git 提交,任一步失败字节级回退不残留半合入状态。

  3. WHEN 迭代:新版本 modify 任一 chunk(prd/fsd/tdd)THEN 组合视图下该 chunk 保有全部既有关系(deps/impact 可沿关系逐层定位波及面);改/删 split 依赖声明经 owned-scope
  对账落到基线;chunk_id 不变则全部边跨版本存活。

  4. IF 任何写入违反写时门禁(幽灵端点/TDD 第二父/PRD 第二 FSD/制品撞车/幽灵版本)THEN 拒于落盘前且零残留,修正后可重试;IF 版本违反六不变式 THEN merge 报 INVARIANT_VIOLATION 拒于任何落盘之前。

  5. WHEN 每层 confirm 后 revert THEN 冻结解除、phase 回退、内容可继续修改(门禁配返工,无终态陷阱);`version revert` 整版退出不留残迹。

  6. 全量测试套件(acceptance_command 配置的 pytest)通过是任何 merge 的前置条件——系统自身的演进也必须过自己的门禁(dogfood)。'
