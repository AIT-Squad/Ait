  ### 交互契约


  - 创建：`create_prd/create_fsd/create_tdd`（写版本工作区、ensure 版本 meta；TDD 必含 target_file）。

  - 建边：`add_edge(src,dst,rel)` rel∈{decomposes,details,depends_on}。

