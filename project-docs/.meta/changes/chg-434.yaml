new_content: "<!-- @id:[FSD]-ait:version -->\n## version 域\n### 功能描述\n版本生命周期与基线合并。一个\"版本\"是一次变更的原子单元(全有或全无):chunk 在版本工作区经历三态(working\
  \ 可反复修改 → staged 中间态 → committed 锁定不可改),锁定后经纯门禁校验,一次性原子合入基线并产生一个 git 提交;任一步失败则把 docs 与 .meta 关键状态按字节还原(不残留半合入状态),可修复后重试;不满意可整版物理清空退出。confirm\
  \ 门禁是六不变式的全局权威闸口——六不变式即规格治理的六条硬约束:①每份 PRD 恰与 1 个 FSD 关联;②每个 TDD 向上恰有 1 个 FSD(details 入边)、向下恰有 1 个制品文件;③每个制品路径只由 1 个 TDD\
  \ 持有;④所有关联经真实存在的 chunk(无幽灵边);⑤除规格树根外无孤儿 chunk;⑥任一制品沿 TDD→FSD→PRD 可追溯。任何一条违例,合入即被拒于任何落盘之前。配置制品验收命令后,门禁还会先跑测试,红则同样拒绝。\n\n\
  ### 反向要求\n- 不解析单个 chunk 的语法与边界(归 doc_model 域)。\n- 不存储、不查询 chunk 间关系图(归 specgraph 域)。\n- 不生成任何业务代码或制品内容(归 new_model 域的 codegen)。\n\
  - 不做多用户并发锁(单用户本地工具边界)。\n\n### 能力契约\n- **提供方式**:Python 类 `VersionManager(project_root)`\n- **接口**:\n  - 生命周期:`create(version,\
  \ based_on=None) -> VersionMeta`(已存报错)、`current() -> str|None`、`list_versions() -> list[VersionMeta]`\n  - 三态:`stage(version,\
  \ chunk_ids=None) -> StageResult{staged,skipped}`、`commit(version, message) -> CommitResult{commit_id,changes}`、`uncommit(version,\
  \ chunk_ids) -> {reverted,not_found}`、`status(version) -> StatusReport{version,working,staged,committed,by_action}`\n  -\
  \ 纯门禁:`gate(version) -> {passed, violations:[{code,message,chunk_id}], acceptance}`(零落盘可重复)\n  - 原子合入:`confirm(version,\
  \ *, allow_dirty_git=False, conflict_policy=\"use-version\") -> {merged_chunks, commit, git}`(失败字节级回退)\n  - 逃生:`reset(version,\
  \ *, confirmed) -> dict`\n  - 验收:`run_acceptance() -> {passed,skipped,command,exit_code}` / `set_acceptance_command(cmd)`\n\
  \  - 错误:`VersionManagerError{code}` ∈ {CHUNK_LOCKED,COMMIT_EMPTY,GIT_DIRTY,MERGE_NO_COMMITTED,MERGE_ROLLBACK,GIT_COMMIT_FAILED,INVARIANT_VIOLATION,ACCEPTANCE_FAILED,MODIFY_RENAME_COLLISION,DUPLICATE_OVERRIDES_TARGET,DUPLICATE_BASELINE_CHUNK,TASK_NOT_DONE}"
