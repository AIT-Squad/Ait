new_content: '<!-- @id:[FSD]-ait-indexing:index_manager -->

  ## index_manager

  ### 功能描述

  IndexManager 类,索引的重建者与查询者。职责:路径助手(baseline/version 索引文件与目录定位、按 file 名查找 baseline 或 version 内的文档);scan_dir 调 doc_model 解析器把一个目录下的
  markdown 全部解析成 ParsedFile 列表;build_baseline 从 docs/ 重建 BaselineIndex(含 global 分类)、build_links 重建 LinksIndex、rebuild_baseline
  一次产出二者;query_baseline 按 chunk_id 查基线条目、query_version 查某版本条目、all_version_records 取某 chunk 在版本内的全部历史记录;load/save_version_index
  读写版本索引;内部 _compute_stats 与 _compute_tasks_summary 汇总三态/action/task 计数;list_versions 列出全部版本名。


  ### 反向要求

  - 不建立或读取关系图(关系归 specgraph 域,本类只读 chunk 自身状态)。

  - 不解析 markdown(把文本转 chunk 委托 doc_model 的 chunk_parser,本类只组织解析结果)。

  - 不做版本生命周期编排(三态流转与合并归 version 域,本类只提供索引读写原语)。'
