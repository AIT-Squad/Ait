new_content: '<!-- @id:[FSD]-ait-init:init_manager -->

  ## init_manager

  ### 功能描述

  InitManager 类,`ait init` 的实现者。提供:`run(*, check_only=False, skip=(), new_model=False, project_name="project") -> InitResult`——初始化主入口,先按当前
  global 状态判定(fresh 全新 / incomplete 部分存在 / ready 已就绪)选择全量 bootstrap 或增量补全,new_model=True 时改走新模型骨架 bootstrap(生成 [PRD]-{project_name}
  与 [FSD]-{project_name} 根,建二者的 decomposes 边入 specgraph),check_only=True 只报告状态不写盘,skip 列出用户声明放弃的增量项;`refresh_wrapper() ->
  InitResult`——仅重写项目本地 wrapper(路径变更后用);`has_any_version() -> bool`。project_name 经校验(非法字符/路径穿越报 INVALID_PROJECT_NAME);bootstrap
  后断言根 chunk 确实进入基线,否则报 BOOTSTRAP_FAILED(防静默产出空基线)。返回 InitResult(created_files, chunks, specs, skill_dir, cli_path, wrapper_path,
  status, files, skipped)。


  - **`_ensure_docs_git_repo()(v2.55)`**:在 `_ensure_project_docs_skeleton` 之后调用;若 `project-docs/.git` 不存在则执行 `git init`(cwd=project-docs);在宿主根
  `.gitignore` 安全追加 `project-docs/` 行(先检查是否已存在,exist-check 后追加,不重复);在 `project-docs/.gitignore` 写入 `versions/*/state.md`(派生产物,不追踪)。全部幂等。


  ### 反向要求

  - 不接受工作根覆盖配置(project-docs 位置的硬约束归 foundation 的 root 模块)。

  - 不做增量之外的内容修改(不改已存在文件,幂等保证)。

  - 不生成 wrapper 以外的可执行脚本、不装依赖(环境准备归安装器 install.py,不在本域)。'
