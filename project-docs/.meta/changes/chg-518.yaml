new_content: "<!-- @id:[FSD]-ait:version -->\n## version 版本域\n\n### 功能描述\n版本生命周期与基线合并:版本是全有或全无的原子变更单元——chunk 三态流转(working→staged→committed)、锁定、纯门禁(可重复跑零落盘)、原子合入基线(失败字节级回退)、任意阶段整版退出、制品验收。confirm\
  \ 是六不变式(①每份 PRD 恰与 1 个 FSD 关联 ②每个 TDD 向上恰 1 个 FSD、向下恰 1 个制品 ③每个制品恰由 1 个 TDD 持有 ④所有关联经真实存在的 chunk ⑤除树根外无孤儿 chunk ⑥任一制品沿 TDD→FSD→PRD\
  \ 可追溯)的全局权威闸口。内部分解见 [FSD]-ait-version。\n\n### 能力契约\n- **提供方式**:Python 类(ait.version_manager.VersionManager),CLI 命令组 `ait\
  \ version` / `ait acceptance`\n- **接口**:\n  - `version create <v>`——显式开版本(已存在报错);`current() -> str|None`、`list_versions()`\n\
  \  - `version commit <v>`——全部 working chunk → committed 锁定(锁定后修改报 CHUNK_LOCKED);`uncommit(version, chunk_ids)` 层级返工原语(committed/staged→working,merged\
  \ 拒)\n  - `version confirm <v>`——纯门禁:`gate(version) -> {passed, violations, acceptance}`,汇集 task 完成度、重复/改名冲突(MODIFY_RENAME_COLLISION/DUPLICATE_OVERRIDES_TARGET)、六不变式、制品验收;可重复跑、零落盘\n\
  \  - `version merge <v>`——原子合入:同一门禁前置→备份→逐文件合并 chunk→关系图提升入基线(depends_on 按 owned-scope 对账)→git 提交;任一步失败字节级回退报 MERGE_ROLLBACK;git\
  \ 三分语义(非 git 环境 git:\"unavailable\"/无变更返回 HEAD/真实失败 GIT_COMMIT_FAILED 回滚)\n  - `version revert <v> --confirm`——物理清空未合入版本\n\
  \  - `acceptance set \"<cmd>\"` / `acceptance run`——配置/执行制品验收命令(exit≠0 → 门禁 ACCEPTANCE_FAILED;未配置跳过)\n  - 错误:VersionManagerError{code}\
  \ ∈ CHUNK_LOCKED/GIT_DIRTY/MERGE_ROLLBACK/GIT_COMMIT_FAILED/INVARIANT_VIOLATION/ACCEPTANCE_FAILED/VERSION_NOT_FOUND\n\n\
  ### 反向要求\n- 不做 chunk 合并算法细节(域内 merge_engine 承担)、不算六不变式细节(调 new_model 校验器)。\n- 不解析文档、不建关系边(分别归 doc_model/new_model 域)。"
