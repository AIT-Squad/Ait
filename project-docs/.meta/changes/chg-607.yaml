new_content: '<!-- @id:[PRD]-ait:iteration_continuity -->

  ### 需求:迭代连续性——现状驱动的分层讨论


  **用户故事:** 作为 AI 协作开发者,我希望每层文档的创作/修改讨论都自动获得"沿关联检索出的系统现状"作为背景,以便结合现状与我的修改方向形成新内容,保证修改的连续性和可持续性。


  #### 验收标准

  1. WHEN 在任一层发起创作而未提供内容 THEN 系统 SHALL 返回该层的讨论背景——本版本上层改动的全文、沿关联检索出的现状全文、目标既有内容(如存在)——且零写入。

  2. WHEN 针对一个已命名的分解/细化锚点(父块)发起而未提供内容 THEN 背景 SHALL 以该父块为中心:父块全文、其全部相邻块、其向上到需求的链条、既有子块。

  3. WHEN 项目初始(基线为空) THEN 同一逻辑 SHALL 返回空背景——初始是"现状为空的迭代",逻辑零分支;初始化 SHALL 从一开始就建立空的基线存储。

  4. 背景 SHALL 由系统沿关联自动提取组装,无需人工翻找文件;关联的结构完整性(六不变式)是检索可靠性的前提。'
