new_content: "<!-- @id:[FSD]-ait:foundation -->\n## foundation 基础设施域\n\n### 功能描述\n通用基础设施底座:项目根解析、原子文件写与路径越界守卫、pydantic 模型与\
  \ YAML 互转、chunk 内容指纹。纯工具、无业务状态,被几乎所有域消费;自身不依赖任何业务域。内部分解见 [FSD]-ait-foundation。\n\n### 能力契约\n- **提供方式**:Python 模块函数与数据类(ait.root\
  \ / ait.io_utils / ait.yaml_io / ait.hash_utils)\n- **接口**:\n  - `resolve_project_root() -> ProjectRoot(cwd, root, docs,\
  \ meta)`——解析 `<CWD>/project-docs/` 为唯一合法工作根;错误:NOT_AT_PROJECT_ROOT / PROJECT_DOCS_MALFORMED / CWD_INSIDE_PROJECT_DOCS\n\
  \  - `atomic_write_text(path, content, *, encoding=\"utf-8\")` / `atomic_write_bytes(path, data)`——tmp+fsync+replace 原子写,不留半写文件\n\
  \  - `ensure_within(project_root, target) -> Path`——路径越界守卫;越界抛 PathOutsideProjectError\n  - `to_posix_rel(root, path) ->\
  \ str`、`strip_md_ext(rel_path) -> str`\n  - `load_yaml(path) -> dict`、`load_model(path, Model) -> Model`、`dump_model(model)\
  \ -> str`、`save_model(path, model)`——YAML↔pydantic,稳定块状风格,datetime→isoformat\n  - `normalize(text) -> str`(CRLF→LF+strip)、`chunk_hash(content)\
  \ -> str`(SHA-256 前 8 hex)、`file_hash(content) -> str`\n\n### 反向要求\n- 不含业务语义(不知道 chunk/version/图为何物)。\n- 不接受工作根覆盖配置(无 --root/环境变量,目录名硬编)。"
