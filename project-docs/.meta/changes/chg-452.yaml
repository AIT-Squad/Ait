new_content: '<!-- @id:[FSD]-ait-foundation:io_utils -->

  ## io_utils

  ### 功能描述

  原子文件写与路径越界守卫。提供:`atomic_write_text(path, content, *, encoding="utf-8")` 与 `atomic_write_bytes(path, data)`——先写 `.tmp` 兄弟文件再
  fsync 后 os.replace(POSIX 与 Windows 均保证覆盖式原子改名),异常时清理临时文件并重抛,保证不留半写文件;`ensure_within(project_root, target) -> Path`——解析 target
  绝对路径并断言落在 project_root 内,越界抛 PathOutsideProjectError;`to_posix_rel(root, path)` 返回 POSIX 分隔的相对路径;`strip_md_ext(rel_path)`
  去除结尾 .md 后缀(供索引 file 字段用)。


  ### 反向要求

  - 不做非原子的直接 open+write(所有写必须走 tmp+replace 保证原子性)。

  - 不校验内容格式(只保证写入的原子性与路径安全,内容语义归调用方)。'
