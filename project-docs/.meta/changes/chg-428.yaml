base_content: '<!-- @id:[TDD]-ref_new_model_format -->

  ## ref_new_model_format TDD


  ```yaml

  target_file: skill/ait/references/new-model-format.md

  ```


  ### 技术栈


  Markdown（随 ait skill 分发的格式资产）。


  ### 文件职责


  新模型格式权威规范（单一来源，v2.29 对齐当前命令面）：ID([PRD]/[FSD]/[TDD] 前缀、内部 split <父>:<名>)；三关系(decomposes PRD/FSD→FSD、details 叶FSD→TDD、depends_on
  同父兄弟)及合法性——**关系只随内容创建原子出生且只入 specgraph（文档正文零关系声明）：depends_on 随 fsd create 的 split 内临时 yaml 块申报（建 specgraph 边后从正文剥离）、decomposes
  随 fsd decompose、details 随 tdd create --parent；无任何 link/depend 命令。§5 明确 PRD/FSD/TDD 正文不承载关系，所有关系经 SpecGraph 查询**；**六不变式**(PRD↔1FSD、TDD↔1FSD/1制品、制品↔1TDD、关联经
  chunk、无孤儿、可追溯)与错误码映射；target_file 唯一（归一化判重）且可指任意生成目标；**生命周期**：version create（或 prd create 自动开版本）→ 各层 create ＋ confirm/revert
  冻结-返工对（phase 阶段机）→ version commit（锁定）→ version confirm（纯门禁：六不变式＋制品验收，可重复零落盘）→ version merge（唯一原子落盘，失败字节级回退）→ version revert（整版退出）；codegen
  prepare 上下文契约（TDD＋上溯全链＋路径 depends_on）；**错误码全表**（格式/写时门禁/全局门禁/验收/合并/CLI 六组）；validate-new-model 保留为只读诊断。**v2.33 三类分化：PRD=问题与价值(零技术,需求项自带用户级验收);FSD=结构与职责(黑盒接口层)——递归同构:root(职责+分解视图)+功能
  split(能力契约 provide-only:提供方式+接口签名+参数/返回类型+错误语义,不写需要什么、不写内部实现)+恰 1 个 `:TEST`(文件级集成验收,大写保留标记);能力契约放父级 split(接口层拆分者 owns/实现层子文件+TDD
  开发者 owns,decompose 边=所有权交接线);codegen 顺 specgraph depends_on 取对端能力契约作开发依据。TDD=文件级实现蓝图(白盒:唯一有函数签名/内部结构/实现逻辑/单测)。`:TEST` 是验收节点(非
  decompose 非 details),将来 P9 从它 details 出测试 TDD**。


  ### 单元测试要求


  无单测；格式规则的强制由 new_model_validator / chunk_parser 代码侧承担，本文件是人读规范/模板。'
