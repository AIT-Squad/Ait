new_content: "<!-- @id:prd-v2-fsd-tdd-structure-rules -->\n## PRD/FSD/TDD structure and graph rules\n\n### 概述\n\nThe target\
  \ document model is a chunk graph:\n\n```text\nVersion\n  -> one PRD\n      -> root FSD\n          -> recursive child FSD\n\
  \              -> leaf FSD\n                  -> one or more TDD\n                      -> each TDD maps to one code file\n\
  ```\n\nFiles are physical containers. Chunks are the semantic unit. Relationships are chunk-to-chunk specgraph edges.\n\n\
  ### 业务规则\n\n- Each version in the new model has exactly one PRD.\n- Every PRD/FSD/TDD file must have a root chunk.\n- The\
  \ root chunk represents the whole file and carries common file-level context.\n- The root chunk does not replace internal\
  \ semantic chunks.\n- A file may contain internal chunks for requirement items, split items, or implementation detail blocks.\n\
  - PRD root chunk maps to the root FSD root chunk with `decomposes`.\n- Parent PRD/FSD files describe downstream FSD/TDD\
  \ parts through internal split chunks.\n- Parent-child edges are emitted from the parent internal split chunk, except for\
  \ the PRD root to root FSD case.\n- `decomposes` is used for PRD/FSD to FSD relationships.\n- `details` is used for FSD\
  \ to TDD relationships.\n- `depends_on` is used only between sibling internal split chunks inside the same parent FSD file.\n\
  - FSD files may recursively decompose into child FSD files.\n- A leaf FSD may detail one or more TDD files.\n- One FSD node\
  \ must not mix child FSD and TDD children.\n- If a lower-level FSD needs a dependency owned by a parent sibling, the dependency\
  \ must be lifted to the parent split level.\n- Infrastructure capabilities such as database, Redis, and message queue are\
  \ modeled as normal FSD parts.\n\nNaming rules:\n\n- File name equals root chunk id plus `.md`.\n- File name and root chunk\
  \ id use `[PRD]`, `[FSD]`, or `[TDD]` prefixes.\n- `_` joins words inside one semantic name.\n- `-` joins hierarchy levels.\n\
  - Internal split chunk id uses `<parent_root_chunk_id>:<internal_split_chunk_name>`.\n- Internal split chunk id must not\
  \ use literal `:split` as a fixed suffix.\n- AIT must not infer semantic relationships from chunk id or file name strings.\n\
  - Normal AIT usage must create specgraph relationships explicitly when documents are generated.\n\n### 验收标准\n\n- A validator\
  \ can detect invalid edge types and invalid graph structures.\n- A validator can reject FSD nodes that mix FSD children\
  \ and TDD children.\n- A validator can reject `depends_on` edges that do not connect sibling internal split chunks.\n- A\
  \ validator can reject `depends_on` edges that point directly to downstream root chunks.\n- A validator can reject parent-child\
  \ edges emitted from the wrong source chunk.\n- Demo documents can represent infrastructure as ordinary FSD capability and\
  \ dependency.\n\n### 边界与非目标\n\n- v2.0 does not introduce file-level graph edges.\n- v2.0 does not introduce additional trace\
  \ relation types beyond `decomposes`, `details`, and `depends_on`.\n- v2.0 does not decide FSD split depth automatically."
