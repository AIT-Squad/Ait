base_content: '<!-- @id:[FSD]-ait-indexing -->

  ## indexing FSD


  ### 功能范围


  索引重建与历史迁移：baseline/version chunks-index 的扫描重建、加载、查询；一次性 schema 迁移（block→chunk）。chunks-index 管「块自身状态」（与 specgraph 管关系互补）。


  ### 交互契约


  - 重建：`rebuild_baseline()->（BaselineIndex,LinksIndex)`、`scan_dir/build_baseline/build_links`。

  - 查询：`query_baseline(chunk_id)`、`query_version(version,chunk_id)`、`load_baseline/load_version_index/save_version_index/all_version_records/list_versions`。

  - 迁移：`migrate_block_to_chunk(meta_dir, dry_run)`。'
new_content: '<!-- @id:[FSD]-ait-indexing -->

  ## indexing 内部分解


  ### 功能描述

  indexing 域的实现分解。该域负责索引的重建、加载、查询与一次性历史迁移。chunks-index 记录"块自身状态"(每个 chunk 的 action/state/统计),与 specgraph 记录"块间关系"互补,二者分工不重叠。它从
  doc_model 的解析器拿到 chunk 结构,把它们组织成 baseline 索引(全库当前态)与 version 索引(单版本工作态)。实现拆为两个文件:index_manager(索引重建与查询)与 migrations(block→chunk
  历史术语迁移)。


  ### 反向要求

  - 不管理块间关系(decomposes/details/depends_on 归 specgraph 域,本域只管块自身状态)。

  - 不解析 markdown 语法(委托 doc_model 的 chunk_parser)、不做原子写(委托 foundation 的 io_utils)。

  - 本文件不定义域对外公共接口(域契约在顶层文件 [FSD]-ait 的 indexing 域块,本文件是内部实现分解)。


  ### 分解视图

  - index_manager 叶(details → [TDD]-index_manager):索引重建、加载、查询

  - migrations 叶(details → [TDD]-migrations):block→chunk 一次性历史迁移'
