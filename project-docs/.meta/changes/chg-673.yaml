new_content: "<!-- @id:[FSD]-ait:init -->\n## init 初始化域\n\n### 功能描述\n`ait init` 项目初始化:把目录引导为 AIT 可管理项目——生成 project-docs 骨架、项目\
  \ wrapper 与 config、按状态选全量/增量,支持新模型骨架(--new-model)。幂等。内部分解见 [FSD]-ait-init。\n\n### 能力契约\n- **提供方式**:Python 类(ait.init_manager.InitManager),CLI\
  \ 命令 `ait init`\n- **接口**:\n  - `run(*, check_only=False, skip=(), new_model=False, project_name=\"project\") -> InitResult(created_files,\
  \ chunks, specs, skill_dir, cli_path, wrapper_path, status, files, skipped)`——fresh/incomplete/ready 状态判定;new_model=True\
  \ 生成 docs/{prd,fsd,tdd} 与 [PRD]/[FSD] 根 + derives 派生边(直接入 specgraph,PRD 正文零关系);check_only 只报告\n  - `refresh_wrapper() ->\
  \ InitResult`——仅重写 wrapper\n  - 错误:INVALID_PROJECT_NAME(名称非法/路径穿越)、BOOTSTRAP_FAILED(根 chunk 未入基线,防静默空基线)\n\n- **白板起步 bootstrap(v2.54)**:init\
  \ 在不含 project-docs 的空目录能自建骨架(docs/ 与 .meta/{versions,changes} 目录)后再引导——`ait init` 是白板入口,不因缺目录被根解析拒;其余命令仍要求项目根已存在。幂等(exist_ok),不破坏既有内容。\n\
  - **空基线保证(迭代连续性地基)**:init(含非 --new-model)确保 .meta 下空的基线索引与关系图文件落盘——初始=现状为空的迭代,任何背景检索逻辑零分支\n\n- **空基线保证(迭代连续性地基)**:init(含非\
  \ --new-model)确保 .meta 下空的基线索引与关系图文件落盘——初始=现状为空的迭代,任何背景检索逻辑零分支\n- **docs 仓独立化(v2.55)**:init 在 project-docs 内 `git init`\
  \ 建独立 docs 仓(若不存在);在宿主根 .gitignore 追加 `project-docs/`(文本追加,零 git 操作守红线);在 docs 仓内写 .gitignore 排除 `versions/*/state.md`(派生产物不追踪)\n\
  \n### 反向要求\n- 只搭骨架不创作内容(PRD/FSD/TDD 内容归各域 create 流)。\n- 不覆盖已存在文件(幂等)。"
