new_content: '<!-- @id:[PRD]-ait -->

  <!-- @ref:fsd/[FSD]-ait#[FSD]-ait rel:decomposes -->

  ## ait 产品 PRD


  ### 概述


  AIT 是面向 AI 协作的"类 Git"文档版本管理工具，服务 vibe coding 下 PRD/设计文档的协作与版本管理，打包为开源 Claude Code Skill。解决传统 Git 三不足：不够细粒度（chunk 级 vs 行级）、不够语义化（spec↔代码关联）、不够
  AI 友好（聚焦上下文组装）。


  ### 范围


  In scope：chunk 级三态版本控制与原子版本；旧 `prd→impl→task→code` 流水线；并行 `prd→fsd→tdd→code` 新模型；spec→代码追溯；FSD 分区支持并行开发。Out of scope：多人实时协作锁；反向
  code→spec 与需求级（PRD 子条目→FSD）追溯；非 markdown 文档。


  ### 需求：chunk 级文档版本控制


  以 `<!-- @id -->` chunk 为单位版本化：三态 working→staged→committed，commit 即锁定本版本不可改；版本为原子单元，要么整体 confirm 合入基线、要么 `version reset`
  整版重来，无局部撤销；baseline 与 per-version 索引/specgraph 分文件。验收：三态流转与锁定生效；confirm 原子合并失败回退；reset 物理清空。


  ### 需求：双流水线（旧 prd/impl/task + 新 prd/fsd/tdd）


  旧模型：PRD（需求）→ impl（实现设计，含 @extract 动态 global）→ task（AI 编码单元）→ code。新模型：PRD → 递归 FSD（功能分解树）→ 叶 FSD `details` TDD（一文件一映射）→
  codegen → code。两模型并存，旧命令不动；新模型用 prdv2/fsd/tdd/codegen。验收：两条流水线分别可端到端跑通。


  ### 需求：可追溯——spec→代码（目标 1）


  每个叶 TDD 唯一映射一个 `target_file`；`codegen prepare <tdd>` 沿 specgraph 上溯 FSD/PRD、旁取依赖契约，输出聚焦代码生成上下文（含 target_file）；无活动版本时从 baseline
  解析。验收：codegen 能从任一叶 TDD 解析出 target_file 与上游/依赖上下文。


  ### 需求：可拆分——并行不冲突（目标 2）


  FSD 递归分解把系统拆成互不重叠功能子树，不同人领不同子树；每个 TDD 唯一映射一个 target_file，`validate-new-model` 强制 target_file 全局唯一（重复报 `DUPLICATE_TARGET_FILE`）；关系仅三种
  `decomposes`/`details`/`depends_on`，不从命名推断，必须显式建边。验收：重复 target_file 被拦截；FSD 图结构合法性校验通过。'
