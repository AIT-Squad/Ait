new_content: '<!-- @id:[TDD]-template_fsd -->

  ## template_fsd TDD


  ```yaml

  target_file: skill/ait/templates/TEMPLATE-FSD-AIT-DRAFT.md

  ```


  ### 技术栈


  Markdown（随 ait skill 分发的格式资产）。


  ### 文件职责


  新模型 FSD 文档模板（v2.33 三类分化：FSD=结构与职责，黑盒接口层）。递归同构结构——**每个 FSD 文件 = root chunk + N 个功能 split + 恰 1 个 `:TEST` 验收 split**：

  - **root**：功能域职责边界（承接哪部分上游、负责/不负责什么）＋ **分解视图**（列子块结构，不列签名）。

  - **功能 split**：功能描述 ＋ **能力契约（provide-only）**——`提供方式`（HTTP/函数/CLI/事件…）＋ `接口`（方法/端点、参数名与类型、返回结构与类型、错误语义）。**只写"我对外提供什么"，绝不写"我需要什么"**（依赖是
  depends_on 关系，只在 specgraph）。**不写函数内部实现/算法**（那是 TDD）。split 上**无验收标准**。

  - **`:TEST`**：本文件所有块合并到一起的**集成验收**（WHEN/THEN 端到端可验证）。是本 FSD 文件的验收落点；一个 decompose 出子文件的 split，其验收看子文件的 `:TEST`；叶子 split 的验收由本文件
  `:TEST` 覆盖。

  - **正文零关系声明**：depends_on 在 fsd create 讨论时以临时 yaml 块申报、建 specgraph 边后剥离；decomposes 随 fsd decompose、details 随 tdd create --parent。模板只含注释说明此约定。

  - **能力契约放父级 split**（多人协作：接口层=拆分者 owns 契约，实现层=子文件/TDD=开发者 owns；decompose 边=所有权交接线）。


  ### 单元测试要求


  无单测；格式规则的强制由 new_model_validator / chunk_parser 代码侧承担，本文件是人读规范/模板。'
