base_content: '<!-- @id:[FSD]-ait-specgraph -->

  ## specgraph FSD


  ### 功能范围


  spec 关系图（块间关系视角，替代 links-index）：spec/edge 模型、URI 体系、从 @ref 重建 + 保留显式边、依赖/影响/成环查询、dot 导出、baseline+per-version 分文件与合并；**组合图视图（chunk_id
  世界）**——跨 baseline∪版本按 chunk 身份统一查询，供 codegen/deps/impact 消费。提供 deps/impact 查询命令。


  ### 交互契约


  - 图：`load_specgraph/combined_specgraph(baseline+version)/sync_specgraph/resolve_chunk_uri`。

  - 查询：`SpecGraph.query/dependencies/implementations/impacted/detect_cycle/implements_of`。

  - **组合视图**：`combined_view(root,version)` → `CombinedView`——chunk 身份=chunk_id，版本覆盖 baseline（modify=同节点换内容来源），边端点坍缩为 chunk_id
  并去重；`edges_from/edges_to/impacted/detect_cycle`。被 modify 进版本的 chunk 在视图中保有 baseline 期建立的全部关系（消除 URI 二象性）；depends_on 边按 owned-scope
  覆盖——版本内出现的 FSD 根，其兄弟依赖边以版本为准，声明删除立即生效。

  - 合并：`dry_run_merge/merge_into_baseline`；`add_edge`。

  - 命令：`query_deps`(deps)、`analyze_impact`(impact)。'
new_content: '<!-- @id:[FSD]-ait-specgraph -->

  ## specgraph 内部分解


  ### 功能描述

  specgraph 域的实现分解。该域是块间关系的权威存储与查询层(取代早期 links-index):以 spec/edge 模型记录 PRD/FSD/TDD chunk 之间的 decomposes/details/depends_on/implements
  关系,提供从 markdown @ref 重建、保留命令建的显式边、依赖/影响/成环查询、组合视图(把 baseline∪版本坍缩到 chunk_id 世界供跨版本统一查询)。它是 codegen 上溯、deps/impact 查询、六不变式校验的关系数据来源。实现拆为三个文件:specgraph(图模型与组合视图内核)、deps(依赖查询命令)、impact(影响分析命令)。


  ### 反向要求

  - 不记录 chunk 自身状态(action/state/统计归 indexing 域,本域只管块间关系)。

  - 不强制六不变式(校验归 new_model 域的校验器,本域只提供查询能力供其消费)。

  - 不解析 markdown 语法(委托 doc_model)、不做原子写(委托 foundation)。

  - 本文件不定义域对外公共接口(域契约在顶层文件 [FSD]-ait 的 specgraph 域块,本文件是内部实现分解)。


  ### 分解视图

  - specgraph 叶(details → [TDD]-specgraph):图模型、URI 体系、组合视图内核

  - deps 叶(details → [TDD]-deps):依赖关系查询命令

  - impact 叶(details → [TDD]-impact):下游影响分析命令'
