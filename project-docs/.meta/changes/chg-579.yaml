new_content: "<!-- @id:[FSD]-ait:new_model -->\n## new_model 新模型域\n\n### 功能描述\n新模型主线(PRD→FSD→TDD→codegen)的引擎:创建三类文档、关系随内容创建原子出生、六不变式校验内核、codegen\
  \ 上下文组装。关系出生的四条路(四关系四出生地):derives 随 fsd create --parent(从 PRD 派生功能树根,创建即建边)、decomposes 随 fsd decompose(FSD 向下拆分即建边,仅限 FSD\
  \ split→FSD 根)、details 随 tdd create --parent(叶子细化即建边)、depends_on 随 fsd create 的 split 内临时 yaml 声明(建边后从正文剥离,文档零关系声明);无任何\
  \ link/depend 命令,幽灵边从入口消灭。内部分解见 [FSD]-ait-new_model。\n\n### 能力契约\n- **提供方式**:Python 类与纯函数(ait.new_model_manager.NewModelManager\
  \ / ait.new_model_validator),CLI 命令组 `ait prd` / `ait fsd` / `ait tdd` / `ait codegen`\n- **接口**:\n  - `prd create <id>\
  \ --content*`——PRD 写入版本工作区;流转入口(无活动版本自动开版本,phase→prd-creating);`prd confirm` / `prd revert` 冻结-返工对\n  - `fsd create <id>\
  \ [--parent <prd-root>] --content*`——FSD 写入;--parent 给出时创建即建 derives 边(PRD 根→FSD 根,派生;父侧预检:parent 须为 PRD 根、已有 derives 出边报\
  \ PRD_FSD_LINK_NOT_UNIQUE);解析 split 内 depends_on 声明→建边→剥离;`fsd decompose <parent> <child> [--content]`——FSD 向下拆分即建 decomposes\
  \ 边(仅限 FSD split 为 parent,PRD 不再经 decompose;父侧预检 MISSING_ENDPOINT);`fsd confirm` / `fsd revert`\n  - `tdd create <id> --parent\
  \ <fsd_split> --content*`——创建即建 details 边(预检 TDD_MULTI_PARENT);必含 target_file(缺失 TDD_TARGET_FILE_REQUIRED,归一化撞车 DUPLICATE_TARGET_FILE);`tdd\
  \ confirm` / `tdd revert`\n  - `codegen prepare <tdd_id> -> CodegenBundle`——组合视图上溯 TDD→FSD→PRD 全链 + 路径 depends_on 兄弟契约(被\
  \ modify 的 chunk 上下文完整)\n  - `validate_invariants(view) -> list[NewModelViolation]`——六不变式全量校验(供 version 门禁消费);`check_edge_write`\
  \ 写时局部门禁;`normalize_target_file`;违例码 PRD_FSD_LINK_NOT_UNIQUE/TDD_MULTI_PARENT/DUPLICATE_TARGET_FILE/MISSING_ENDPOINT/ORPHAN_CHUNK/TRACE_BROKEN/SPEC_CYCLE\n\
  \  - fsd/tdd create 对不存在版本报 VERSION_NOT_FOUND(prd create 独享自动开版本)\n\n### 反向要求\n- 不存储关系(委托 specgraph)、不做版本门禁落盘(委托 version\
  \ 域)。\n- 不生成代码(codegen 只组装上下文,编码由 skill 层驱动 AI)。"
