new_content: '<!-- @id:[PRD]-ait:docs_code_isolation -->

  ### 需求:docs/code 隔离仓——文档与制品独立的 git 历史


  **用户故事:** 作为开发者,我希望 AIT 的文档历史与宿主代码历史完全独立,以便可以丢弃不满意的代码制品、保留规格文档、重新 codegen——而不丢失任何文档版本记录。


  #### 验收标准

  1. WHEN 运行 init THEN 系统 SHALL 在 project-docs 内建立独立 git 仓(.git),并在宿主根 .gitignore 追加 project-docs/,使文档历史与宿主历史完全隔离。

  2. WHEN 版本进行期间(prd/fsd/tdd create)写入文档工作区文件 THEN 系统 SHALL 不拦截该操作——docs 仓在版本生命周期内故意处于 dirty 状态是合法的,confirm 不因此失败。

  3. WHEN version merge 成功 THEN 系统 SHALL 原子提交 docs 仓所有变更并在 version meta 记录 docs_commit(docs 仓 commit sha)与 code_base(只读宿主
  HEAD),两者作为跨仓版本绑定的语义锚点。

  4. WHEN 代码制品不满意时执行不对称回滚 THEN 宿主仓 reset 到 code_base 扔掉制品,文档仓 SHALL 保持不动,下次 codegen 直接从现有规格重新生成。

  5. IF 宿主非 git 仓(初始或纯文档项目)THEN code_base = null,merge 仍正常完成;docs 仓有独立 git 即满足核心需求。'
