new_content: '<!-- @id:[FSD]-ait-cli:cli -->

  ## cli

  ### 功能描述

  click 命令树与统一输出契约的实现。命令面:新模型主线 version(create/confirm/merge/revert/commit/status)、prd(create/confirm/revert)、fsd(create/decompose/confirm/revert)、tdd(create/confirm/revert)、codegen(prepare)、specgraph/deps/impact、acceptance(set/run);legacy(prdv1/impl/task);init/reindex
  等。统一输出契约:成功走 ok(data)→`{"ok":true,"data":{...}}`,失败走 fail(message,code)→`{"ok":false,"error":...,"code":...}`;stdout 必须是单个
  JSON 对象。JsonGroup 把 click 的用法错误(未知命令/缺参/非法选项)也转成 `{"ok":false,"code":"USAGE_ERROR"}` 而非裸文本 exit 2。_root() 经 foundation 的
  resolve_project_root 解析项目根并存入 click ctx;_read_content 从 --content/--content-file 读入内容。领域错误码(如 VERSION_NOT_FOUND、INVARIANT_VIOLATION、TDD_TARGET_FILE_REQUIRED)透传
  issues[0].code,不吞成笼统码。


  ### 反向要求

  - 不实现业务规则(只调 manager 并转发其返回与错误码)。

  - 不自定义输出格式(只用 ok/fail 两个统一出口,不 print 裸文本)。

  - 不做参数以外的状态管理(无缓存、无全局可变状态,一次调用一次解析)。'
