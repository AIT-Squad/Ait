new_content: '<!-- @id:[FSD]-ait-new_model:TEST -->

  ## TEST 集成验收

  new_model 域所有部件(new_model_manager + new_model_validator)合并到一起、作为整体的集成验收:

  1. WHEN 从空版本依次 create_prd → create_fsd --parent(派生)→ decompose_fsd(拆分)→ create_tdd --parent(细化)THEN 三类文档写入版本工作区,derives/decomposes/details
  边各随其创建命令原子建立,phase 依次推进 prd-creating→fsd-creating→tdd-creating。

  2. WHEN create_tdd 声明的 target_file 归一化后与既有 TDD 撞车 THEN 报 DUPLICATE_TARGET_FILE 拒于落盘前(改路径可重试);TDD 已有他者 details 父再挂一个报 TDD_MULTI_PARENT。

  3. WHEN create_fsd 的 split 内声明 `depends_on: [兄弟]` THEN 建 depends_on 边并从正文剥离;改声明后重跑,该文件兄弟依赖边按新声明全量对账(旧边删、新边增)。

  4. WHEN add_edge 的端点不存在 THEN 报 MISSING_ENDPOINT 零落盘;PRD 已 derives 一个 FSD 再派生第二个报 PRD_FSD_LINK_NOT_UNIQUE;decompose 以 PRD
  为 parent 被拒(PRD→FSD 只走 derives)。

  5. WHEN fsd/tdd create 指定不存在的版本 THEN 报 VERSION_NOT_FOUND;prd create 无活动版本则自动开版本。

  6. WHEN 版本含孤儿 chunk 或断裂追溯链 THEN validate_invariants 报 ORPHAN_CHUNK/TRACE_BROKEN;合规则零违例(供 version confirm 全局门禁消费)。

  7. WHEN prepare_codegen 指定一个 TDD THEN 返回 CodegenBundle,含该 TDD 内容 + 上溯 FSD/PRD 全链 + 路径上 depends_on 兄弟的契约(被 modify 进版本的 TDD
  上下文完整)。'
