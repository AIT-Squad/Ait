base_content: '<!-- @id:[TDD]-merge_engine -->

  ## merge_engine TDD


  ```yaml

  target_file: skill/ait/ait/merge_engine.py

  ```


  ### 技术栈


  Python 3.10+ / pydantic / PyYAML / click（按需）。


  ### 文件职责


  merge_file/merge_new_file：把版本 chunk 合并进 baseline，**按 baseline 真实存在性逐 chunk 判定 action，绝不静默丢 chunk**。内置规则：


  - **modify = 整块全替换**：version 侧提供该 chunk 的完整最终内容（要保留的内容须自带），整个替换 baseline 对应 chunk。

  - **add = 仅用于 baseline 不存在的新 chunk**。

  - **按存在性自动判定**：`modify` 的目标（`overrides` 缺省取 chunk 自身 id）若**不在 baseline，则当作 add 追加**（保留位置顺序），不再静默跳过丢弃；在 baseline 则全替换。

  - `add` 命中 baseline 已存在的 chunk 仍报错（提示改用 modify）。

  - `delete` 删除 `overrides` 指向的 baseline chunk。

  - 保留文件容器（file_header）。


  ### 单元测试要求


  测试位于 tests/test_merge_engine.py：覆盖 modify 全替换、add 新增、delete、`add` 命中已存在报错，以及**回归用例：一个文件含「已存在根(modify) + 新 split(modify 但不在
  baseline)」时，所有 split 必须落入 baseline markdown，不被丢弃**。'
new_content: "<!-- @id:[TDD]-merge_engine -->\n## merge_engine TDD\n\n```yaml\ntarget_file: skill/ait/ait/merge_engine.py\n\
  ```\n\n### 技术栈\n\nPython 3.10+；纯标准库（`dataclasses`、`typing.Iterable`）。依赖本仓库 `chunk_parser.Chunk/ParsedFile`、`schemas.Action`（`Literal[\"\
  add\",\"modify\",\"delete\"]`）。\n\n### 实现约束\n\n- **纯函数，零 I/O**：只操作内存中的 `ParsedFile` + `VersionChunkOp` 列表，不读写磁盘、不碰 git。读基线文件、冲突检测、写回由调用方\
  \ `version_manager.merge` 负责。\n- 两个 dataclass 均 `@dataclass(frozen=True)`。\n\n### 关键数据结构\n\n```python\n@dataclass(frozen=True)\n\
  class VersionChunkOp:\n    chunk_id: str\n    action: Action                 # \"add\" | \"modify\" | \"delete\"\n    overrides:\
  \ str | None = None   # modify/delete 的目标 baseline chunk id\n    insert_after: str | None = None# add 的锚点（None=尾插）\n   \
  \ new_chunk: Chunk | None = None # add/modify 携带的新内容；delete 为 None\n    base_hash: str | None = None   # 失效检测用（本模块不消费）\n\
  \n@dataclass(frozen=True)\nclass MergedFile:\n    file: str\n    file_header: str\n    chunks: list[Chunk]            #\
  \ 合并后有序 chunk 列表\n    new_content: str               # 序列化后的完整文件文本\n```\n\n### 代码结构（公开/私有符号）\n\n- `_serialize(file_header,\
  \ chunks) -> str` / `serialize(...)`（公开别名，测试用）。\n- `merge_file(base: ParsedFile, ops: list[VersionChunkOp]) -> MergedFile`：对已存在的基线文件应用\
  \ add/modify/delete。\n- `merge_new_file(file: str, ops) -> MergedFile`：从纯 add ops 建全新文件。\n\n### 核心逻辑：序列化\n\n`_serialize`：`file_header.rstrip()`\
  \ 非空则作首段；每个 chunk 取 `chunk.content.strip()`；各段以 `\"\\n\\n\"` join，末尾补一个 `\"\\n\"`。\n\n### 算法与流程：merge_file（两趟）\n\n1. **前置守卫**：`base.chunks`\
  \ 为空但 ops 含 modify/delete → `raise ValueError`（应改用 `merge_new_file`）。\n2. **第一趟 分类**（关键：按 baseline **真实存在性** reconcile action，绝不丢\
  \ chunk）：\n   - 计 `base_ids = {c.id for c in base.chunks}`。\n   - `modify`：`target = op.overrides or op.chunk_id`；`target\
  \ in base_ids` → 入 `modify_map[target]`；否则**视为新增**，入 `add_tail`（这是 v2.4 修复：modify 目标不在 baseline 不再被静默跳过）。\n   - `delete`：`op.overrides`\
  \ 非空 → 入 `delete_set`。\n   - `add`：`insert_after is None` → `add_tail`；`insert_after in base_ids` → `add_after_map[insert_after]`\
  \ 追加；否则 → `orphan_adds`。\n3. **孤儿调整**：`add_after_map` 中锚点落在 `delete_set` 的，移出到 `orphan_adds`。\n4. **第二趟 重建** `result`（遍历\
  \ `base.chunks`，维护 `last_kept_chunk`）：\n   - chunk 在 `delete_set`：跳过；若有 orphan 的 `insert_after==该 id` 且有 `last_kept_chunk`，把这些\
  \ orphan 的 `new_chunk` 插在此处。\n   - chunk 在 `modify_map`：用其 `new_chunk` 替换（`new_chunk is None` → `raise ValueError`）；否则原样保留。更新\
  \ `last_kept_chunk`。\n   - 处理 `add_after_map[chunk.id]`：其 `new_chunk` 紧随其后插入。\n   - 处理 `insert_after not in base_ids` 的未附着\
  \ orphan：附在当前 survivor 后，并从 orphan 列表移除。\n5. **尾插**：`add_tail` 各 `new_chunk` 追加（含被 reconcile 成 add 的 modify，按 op 顺序保持原序）。\n\
  6. **剩余 orphan**：插到列表最前（header 之后）。\n7. `new_content = _serialize(base.file_header, result)`，返回 `MergedFile(base.file, base.file_header,\
  \ result, new_content)`。\n\n### 算法与流程：merge_new_file\n\nops 含非 add → `raise ValueError(\"merge_new_file only accepts action=add\
  \ ops\")`；否则收集各 `op.new_chunk`（跳过 None），`file_header=\"\"`，`_serialize(\"\", chunks)`。\n\n### 错误处理（ValueError 触发点）\n\n-\
  \ 空基线 + modify/delete ops；\n- modify 命中但 `new_chunk is None`；\n- `merge_new_file` 收到非 add op。\n\n### 边界条件\n\n- modify 目标不在\
  \ baseline → 当 add（不丢、保序）。\n- delete 的 `overrides=None` → 忽略（不删任何东西）。\n- add 锚点指向被删 chunk → 转 orphan，落到最近 survivor 后或表首。\n\
  - 同文件「已存在根 modify + 新 split modify」→ 根替换、split 尾插（v2.4 回归场景）。\n\n### 单元测试要求\n\n`tests/test_merge_engine.py`：modify 全替换、add\
  \ 尾插、add insert_after、delete、delete 带 orphan、`merge_new_file` 只收 add、空基线守卫、**modify 目标不在 baseline 当 add 不丢（回归）**。framework=pytest；独立运行\
  \ `pytest tests/test_merge_engine.py`；通过标准=全绿。"
