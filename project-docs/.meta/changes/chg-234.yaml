new_content: '<!-- @id:[TDD]-task_manager -->

  ## task_manager TDD


  ```yaml

  target_file: skill/ait/ait/task_manager.py

  ```


  ### 技术栈

  Python 3.10+；依赖 schemas(TaskYaml/CodeRef)、specgraph(combined/implements_of)、index_manager、yaml_io。


  ### 数据结构

  TaskManagerError(RuntimeError)；@dataclass TaskBuildResult；_src_slug(prd_chunk_id)。


  ### 代码结构（TaskManager，旧模型 ait task）

  - create(prd_chunk_id,*,version)：从该 PRD chunk 的 impl 覆盖派生 TaskYaml(id T-slug-NN via _next_seq，impl_refs∪global_refs，depends_on，steps)；要求
  PRD 已锁(PRD_NOT_LOCKED)、有 impl(NO_IMPL)。

  - begin_execute(version,task_id)：标 executing；deps_satisfied(depends_on 全 done 否则 BLOCKED)。

  - complete(version,task_id,commit,paths)：标 done+写 CodeRef。fail：标 failed。

  - assemble_context(version,task)：聚焦 bundle(impl_refs∪global_refs)。

  - list_tasks/load_task/save_task/resolve_tasks/pending_prd_chunks/tasks_dir/task_path。


  ### 状态机 created→executing→done/failed。错误码 PRD_NOT_LOCKED/NO_IMPL/BLOCKED。


  ### 单元测试要求

  tests/test_task_*.py：派生、execute/complete/fail、deps 守卫、code_refs。pytest。'
