  ### 错误码

  `TASK_NOT_DONE`、`GIT_DIRTY`、`MERGE_ROLLBACK`、`CHUNK_LOCKED`、`LOCKED`、`DUPLICATE_BASELINE_CHUNK`、`VERSION_ERROR`、**`INVARIANT_VIOLATION`**。


  ### 边界条件

  merged 版本不可再 confirm/reset；confirm 成功后 git 无脏尾（merged 状态文件并入同一 merge commit）；零 task 时 precheck 通过（taskless 新模型）；confirm
  失败回退后：`meta.merged_at` 为 None、`phase` 不变、版本索引 status 不为 merged、baseline `chunks-index.yaml` 与 `specgraph.yaml` 同 confirm
  前逐字节一致、本次新建的 `snapshots/{version}/` 不存在，且回退后可直接重试 confirm；**不变式门禁发生在任何落盘之前——被拒后工作区与 .meta 原样，补齐规格（如补 PRD 边）即可重试**。


