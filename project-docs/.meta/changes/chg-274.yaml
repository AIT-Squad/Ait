  - **校验**：`pre_merge_check`、`_detect_intra_version_dup`（同 @id / 同 @extract 目标重复）。

  - **纯门禁**：`gate(version) -> dict`——**可重复跑、零落盘**的 confirm 前置检查报告：merged 拒绝、task 全 done、`_assert_no_duplicate_adds`、六不变式（与
  confirm 共享 `_collect_new_model_violations` 内核）；返回 `{version, passed:bool, violations:[{code,message,chunk_id}…]}`，不抛不变式异常（merged/版本不存在仍抛）。**CLI
  映射：`version confirm`→gate（纯门禁）、`version merge`→confirm（原子合入，内部先过同一门禁）、`version revert`→reset。**

  - **合并**：`merge(version,conflict_policy)`——读 committed records，按 file_key 分组，legacy PRD 路由到 docs/prd/global（`_should_route_legacy_prd_to_global`），每文件构造
