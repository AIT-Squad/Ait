new_content: '<!-- @id:[FSD]-ait-indexing:migrations -->

  ## migrations

  ### 功能描述

  一次性历史 schema 迁移。migrate_block_to_chunk 把历史遗留的 block 术语与字段名整体重命名为 chunk(递归重命名 YAML 键 + 重命名 index 文件),返回 MigrationReport 汇总改动;支持
  dry_run 预览(只报告不落盘);迁移前 _validate_or_raise 校验前置条件,写入走原子写。这是历史遗留数据的一次性升级工具,不是常态流程的一环。


  ### 反向要求

  - 不做常态索引重建(那是 index_manager 的职责,本文件仅处理历史术语升级)。

  - 不触碰块间关系与业务语义(只做机械的键/文件重命名)。

  - 不在非 dry_run 下做无校验的破坏性改动(改动前必先校验)。'
