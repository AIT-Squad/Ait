base_content: '<!-- @id:[FSD]-ait-version -->

  ## version 内部分解


  ### 功能描述

  version 域的实现分解。该域负责版本生命周期与基线合并:版本是全有或全无的原子变更单元——chunk 三态流转(working 可改 → staged 中间态 → committed 锁定)、锁定后过纯门禁(可重复跑、不落盘的校验报告)、原子合入基线(一次
  git 提交,失败按字节回退不残留半合入状态)、任意阶段整版退出。实现拆为两个文件:version_manager(生命周期编排)与 merge_engine(chunk 级合并算法)。


  ### 反向要求

  - 不解析 chunk 语法(归 doc_model 域)、不存储关系图(归 specgraph 域)、不生成制品(归 new_model 域)。

  - 本文件不定义域对外公共接口(域契约在顶层文件 [FSD]-ait 的 version 域块,本文件是内部实现分解)。


  ### 分解视图

  - version_manager 叶(details → [TDD]-version_manager):VersionManager 类,生命周期编排

  - merge_engine 叶(details → [TDD]-merge_engine):纯 chunk 级合并算法'
